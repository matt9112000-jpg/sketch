<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      :root{
        --bg:#ffffff;
        --text:#1f2433;
        --muted:#5f6778;
        --line:#d4d8e3;
        --accent:#1A26FF;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        display:flex;
        align-items:flex-start;
        justify-content:center;
        padding:88px 24px 24px;
      }
      .top-buttons{
        position:fixed;
        top:0;
        left:0;
        right:0;
        height:40px;
        z-index:120;
        display:grid;
        grid-template-columns:1fr 1fr 1fr;
        align-items:center;
        padding:0 18px;
      }
      .top-btn{
        border:none;
        background:transparent;
        padding:0;
        margin:0;
        text-decoration:none;
        font:800 18px/1 Montserrat, system-ui, sans-serif;
        letter-spacing:.06em;
        text-transform:uppercase;
        color:#000;
      }
      #nav-shop{ justify-self:start; }
      #nav-contact{ justify-self:center; }
      #nav-lang{ justify-self:end; }
      @media (max-width:700px){
        .top-buttons{ padding:0 12px; }
        .top-btn{ font-size:15px; }
      }
      .card{
        width:min(680px, 100%);
        border:2px solid var(--line);
        border-radius:16px;
        padding:22px 22px 20px;
        background:#fff;
      }
      h1{
        margin:0 0 8px;
        font-size:22px;
        letter-spacing:-0.02em;
      }
      p{
        margin:0 0 14px;
        color:var(--muted);
        line-height:1.5;
      }
      a{
        color:var(--accent);
        text-decoration:underline;
        font-weight:700;
      }
    </style>
  </head>
  <body>
    <div class="top-buttons" aria-label="Site navigation">
      <a class="top-btn" id="nav-shop" href="./shop.html">SHOP</a>
      <a class="top-btn" id="nav-contact" href="./contact-preview.html">CONTACT</a>
      <button class="top-btn" id="nav-lang" type="button">中文</button>
    </div>
    <div class="card">
      <h1 id="title">CONTACT</h1>
      <p id="desc">Email us for inquiries and collaborations.</p>
      <p>
        <a id="email" href="mailto:insufficientspace20@gmail.com">insufficientspace20@gmail.com</a>
      </p>
    </div>
    <script>
      (function(){
        const params = new URLSearchParams(window.location.search);
        let lang = (params.get('lang') === 'zh') ? 'zh' : 'en';
        const shopLink = document.getElementById('nav-shop');
        const contactLink = document.getElementById('nav-contact');
        const langBtn = document.getElementById('nav-lang');
        [shopLink, contactLink].forEach((el)=>{
          if (!el) return;
          const u = new URL(el.getAttribute('href'), window.location.href);
          u.searchParams.set('lang', lang);
          el.setAttribute('href', u.pathname + u.search);
        });
        if (shopLink) shopLink.textContent = (lang === 'zh') ? '商店' : 'SHOP';
        if (contactLink) contactLink.textContent = (lang === 'zh') ? '聯絡' : 'CONTACT';
        if (langBtn){
          langBtn.textContent = (lang === 'zh') ? 'EN' : '中文';
          langBtn.addEventListener('click', ()=>{
            const next = (lang === 'zh') ? 'en' : 'zh';
            localStorage.setItem('site_lang', next);
            const u = new URL(window.location.href);
            u.searchParams.set('lang', next);
            window.location.href = u.pathname + u.search;
          });
        }
        if (lang === 'zh'){
          document.getElementById('title').textContent = '聯絡';
          document.getElementById('desc').textContent = '有任何合作與詢問，歡迎寄信。';
        }
      })();
    </script>
  </body>
</html>
