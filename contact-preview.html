<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>About</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      :root{
        --bg:#ffffff;
        --text:#1f2433;
        --muted:#5f6778;
        --line:#d4d8e3;
        --accent:#1A26FF;
        --nav-accent:#FF3BDA;
        --nav-line:rgba(26,38,255,.55);
        --cursor-cube:url("./cursor-cube.svg") 9 9;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        display:flex;
        align-items:flex-start;
        justify-content:center;
        padding:max(128px, calc(118px + env(safe-area-inset-top, 0px))) 24px 24px;
      }
      .site-nav{
        position:fixed;
        top:0;
        left:0;
        right:0;
        min-height:calc(136px + env(safe-area-inset-top, 0px));
        height:auto;
        z-index:120;
        display:flex;
        align-items:flex-start;
        padding:max(0px, env(safe-area-inset-top, 0px)) max(14px, env(safe-area-inset-right, 0px)) 8px max(0px, env(safe-area-inset-left, 0px));
        background:transparent;
        pointer-events:auto;
        user-select:none;
        -webkit-tap-highlight-color:transparent;
        gap:6px;
        overflow:visible;
      }
      .site-nav .nav-home{
        flex:0 0 auto;
        display:block;
        padding:0 12px 44px 0;
        margin:-8px 0 0 0;
        text-decoration:none;
        cursor:var(--cursor-cube), pointer;
        border-radius:12px;
      }
      .site-nav .nav-home-visual{
        position:relative;
        display:inline-block;
        line-height:0;
        vertical-align:top;
        transition:transform .26s cubic-bezier(.34,1.56,.64,1);
      }
      .site-nav .nav-home:hover .nav-home-visual,
      .site-nav .nav-home:focus-visible .nav-home-visual{
        transform:translateY(-3px);
      }
      .site-nav .nav-home:active .nav-home-visual{
        transform:translateY(-1px);
        transition-duration:.12s;
      }
      .site-nav .nav-home-logo{
        display:block;
        height:88px;
        width:auto;
        max-height:98px;
        max-width:min(368px, 62vw);
        object-fit:contain;
        filter:drop-shadow(0 2px 6px rgba(0,0,0,.08));
      }
      .site-nav .nav-home-brand{
        position:absolute;
        right:-34px;
        bottom:-68px;
        width:82%;
        min-width:168px;
        max-width:300px;
        opacity:0;
        overflow:visible;
        pointer-events:none;
        z-index:2;
        transform:rotate(-17deg) translateX(20%);
        transform-origin:100% 100%;
        transition:opacity .28s ease, transform .28s cubic-bezier(.2,.9,.2,1);
      }
      .site-nav .nav-home-brand-img{
        display:block;
        width:100%;
        height:auto;
        object-fit:contain;
        transition:filter .28s ease;
      }
      .site-nav .nav-home:hover .nav-home-brand-img,
      .site-nav .nav-home:focus-visible .nav-home-brand-img{
        filter:drop-shadow(0 2px 4px rgba(0,0,0,.14)) drop-shadow(0 10px 22px rgba(0,0,0,.22));
      }
      .site-nav .nav-home:hover .nav-home-brand,
      .site-nav .nav-home:focus-visible .nav-home-brand{
        opacity:1;
        transform:rotate(-17deg) translateX(20%) translate(0,0);
      }
      .site-nav .nav-home:focus-visible{
        outline:2px solid var(--nav-line);
        outline-offset:2px;
        border-radius:4px;
      }
      .site-nav .nav-cluster{
        flex:1;
        min-width:0;
        display:flex;
        align-items:flex-start;
        justify-content:flex-end;
        flex-wrap:nowrap;
        gap:clamp(14px, 3.2vw, 32px);
        row-gap:0;
        padding:12px 0 0 10px;
      }
      .site-nav .hud-btn{
        border:none;
        background:transparent;
        padding:2px 2px;
        margin:0;
        text-decoration:none;
        font:800 17px/1 Montserrat, system-ui, sans-serif;
        letter-spacing:.06em;
        text-transform:uppercase;
        color:#000;
        cursor:var(--cursor-cube), pointer;
        -webkit-appearance:none;
        appearance:none;
        box-shadow:none;
        outline:none;
        white-space:nowrap;
        transition:color .18s ease, transform .2s cubic-bezier(.34,1.56,.64,1);
      }
      .site-nav .hud-btn:hover{
        transform:translateY(-2px);
        color:var(--nav-accent);
      }
      .site-nav .hud-btn:active{
        transform:translateY(0);
      }
      .site-nav .hud-btn:focus-visible{
        outline:2px solid var(--nav-line);
        outline-offset:3px;
      }
      @media (max-width:700px){
        .site-nav{
          padding:max(0px, env(safe-area-inset-top, 0px)) 10px 10px max(8px, env(safe-area-inset-left, 0px));
          min-height:calc(116px + env(safe-area-inset-top, 0px));
        }
        .site-nav .nav-home{ padding:0 8px 26px 0; margin:-5px 0 0 0; }
        .site-nav .nav-home-logo{
          height:66px;
          max-height:74px;
        }
        .site-nav .nav-home-brand{
          width:72%;
          min-width:124px;
          max-width:240px;
          right:-20px;
          bottom:-48px;
          transform:rotate(-15deg) translateX(20%);
        }
        .site-nav .nav-home:hover .nav-home-brand,
        .site-nav .nav-home:focus-visible .nav-home-brand{
          transform:rotate(-15deg) translateX(20%) translate(0,0);
        }
        .site-nav .hud-btn{ font-size:15px; }
        .site-nav .nav-cluster{
          gap:10px 12px;
        }
      }
      .card{
        width:min(680px, 100%);
        border:2px solid var(--line);
        border-radius:16px;
        padding:22px 22px 20px;
        background:#fff;
      }
      h1{
        margin:0 0 8px;
        font-size:22px;
        letter-spacing:-0.02em;
      }
      p{
        margin:0 0 14px;
        color:var(--muted);
        line-height:1.5;
      }
      a{
        color:var(--accent);
        text-decoration:underline;
        font-weight:700;
      }
      .about-lead{
        color:#2c3346;
        font-weight:600;
      }
      .about-links{
        margin-top:8px;
        display:flex;
        align-items:center;
        gap:12px;
      }
      .about-link{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        width:42px;
        height:42px;
        border:1.5px solid #cfd5e6;
        border-radius:999px;
        color:#1A26FF;
        text-decoration:none;
        transition:transform .18s ease, border-color .18s ease, color .18s ease;
      }
      .about-link:hover{
        transform:translateY(-2px);
        border-color:#FF3BDA;
        color:#FF3BDA;
      }
      .about-link svg{
        width:19px;
        height:19px;
        display:block;
        stroke:currentColor;
      }
      .about-links-label{
        font:600 11px/1 Montserrat, system-ui, sans-serif;
        letter-spacing:.1em;
        text-transform:uppercase;
        color:#6a7288;
      }
    </style>
  </head>
  <body>
    <header class="site-nav" aria-label="Site navigation">
      <a class="nav-home" id="nav-home" href="./home.html" aria-label="Home">
        <span class="nav-home-visual">
          <img class="nav-home-logo" src="./home-b.svg" alt="" width="220" height="88" decoding="async" />
            <span class="nav-home-brand" aria-hidden="true">
              <img class="nav-home-brand-img" src="./home-i.svg" alt="" width="360" height="89" decoding="async" />
            </span>
        </span>
      </a>
      <div class="nav-cluster">
        <a class="hud-btn" id="nav-shop" href="./shop.html">SHOP</a>
        <a class="hud-btn" id="nav-contact" href="./contact-preview.html">ABOUT</a>
        <button class="hud-btn" id="nav-lang" type="button">中文</button>
      </div>
    </header>
    <div class="card">
      <h1 id="title">ABOUT</h1>
      <p id="desc" class="about-lead">INSUFFICIENT SPACE is a project about making room for objects, stories, and decisions that matter.</p>
      <p id="desc-2">For collaborations, press, or general inquiries, reach out through Instagram or email.</p>
      <div class="about-links" role="group" aria-label="Social links">
        <a class="about-link" id="ig-link" href="https://www.instagram.com/insufficient__space/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="4" y="4" width="16" height="16" rx="5" stroke-width="1.8"></rect>
            <circle cx="12" cy="12" r="3.6" stroke-width="1.8"></circle>
            <circle cx="17.3" cy="6.8" r="1.1" fill="currentColor" stroke="none"></circle>
          </svg>
        </a>
        <a class="about-link" id="email-link" href="mailto:insufficientspace20@gmail.com" aria-label="Email">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3.5" y="6" width="17" height="12" rx="2.2" stroke-width="1.8"></rect>
            <path d="M4.8 7.6 12 13l7.2-5.4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </a>
        <span id="about-links-label" class="about-links-label">Instagram / Email</span>
      </div>
    </div>
    <script>
      (function(){
        const params = new URLSearchParams(window.location.search);
        let lang = (params.get('lang') === 'zh') ? 'zh' : 'en';
        const navHome = document.getElementById('nav-home');
        const shopLink = document.getElementById('nav-shop');
        const contactLink = document.getElementById('nav-contact');
        const langBtn = document.getElementById('nav-lang');
        [navHome, shopLink, contactLink].forEach((el)=>{
          if (!el) return;
          const u = new URL(el.getAttribute('href'), window.location.href);
          u.searchParams.set('lang', lang);
          el.setAttribute('href', u.pathname + u.search);
        });
        if (shopLink) shopLink.textContent = (lang === 'zh') ? '商店' : 'SHOP';
        if (contactLink) contactLink.textContent = (lang === 'zh') ? '關於' : 'ABOUT';
        if (langBtn){
          langBtn.textContent = (lang === 'zh') ? 'EN' : '中文';
          langBtn.addEventListener('click', ()=>{
            const next = (lang === 'zh') ? 'en' : 'zh';
            localStorage.setItem('site_lang', next);
            const u = new URL(window.location.href);
            u.searchParams.set('lang', next);
            window.location.href = u.pathname + u.search;
          });
        }
        if (lang === 'zh'){
          document.getElementById('title').textContent = '關於';
          document.getElementById('desc').textContent = 'INSUFFICIENT SPACE 是一個關於為重要物件、故事與選擇騰出空間的計畫。';
          document.getElementById('desc-2').textContent = '合作、採訪或一般詢問，歡迎透過 Instagram 或 Email 與我們聯絡。';
          document.getElementById('about-links-label').textContent = 'Instagram / 電子郵件';
        } else {
          document.getElementById('desc-2').textContent = 'For collaborations, press, or general inquiries, reach out through Instagram or email.';
          document.getElementById('about-links-label').textContent = 'Instagram / Email';
        }
      })();
    </script>
  </body>
</html>
