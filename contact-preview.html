<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      :root{
        --bg:#ffffff;
        --text:#1f2433;
        --muted:#5f6778;
        --line:#d4d8e3;
        --accent:#1A26FF;
        --nav-accent:#FF3BDA;
        --nav-line:rgba(26,38,255,.55);
        --cursor-cube:url("./cursor-cube.svg") 9 9;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        display:flex;
        align-items:flex-start;
        justify-content:center;
        padding:max(128px, calc(100px + env(safe-area-inset-top, 0px))) 24px 24px;
      }
      .site-nav{
        position:fixed;
        top:0;
        left:0;
        right:0;
        min-height:calc(112px + env(safe-area-inset-top, 0px));
        height:auto;
        z-index:120;
        display:flex;
        align-items:center;
        padding:max(10px, env(safe-area-inset-top, 0px)) max(14px, env(safe-area-inset-right, 0px)) 12px max(12px, env(safe-area-inset-left, 0px));
        background:transparent;
        pointer-events:auto;
        user-select:none;
        -webkit-tap-highlight-color:transparent;
        gap:6px;
        overflow:visible;
      }
      .site-nav .nav-home{
        flex:0 0 auto;
        display:block;
        padding:4px 12px 26px 14px;
        margin:0;
        text-decoration:none;
        cursor:var(--cursor-cube), pointer;
        border-radius:12px;
      }
      .site-nav .nav-home-visual{
        position:relative;
        display:inline-block;
        line-height:0;
        vertical-align:top;
        transition:transform .26s cubic-bezier(.34,1.56,.64,1);
      }
      .site-nav .nav-home:hover .nav-home-visual,
      .site-nav .nav-home:focus-visible .nav-home-visual{
        transform:translateY(-3px);
      }
      .site-nav .nav-home:active .nav-home-visual{
        transform:translateY(-1px);
        transition-duration:.12s;
      }
      .site-nav .nav-home-logo{
        display:block;
        height:88px;
        width:auto;
        max-height:98px;
        max-width:min(368px, 62vw);
        object-fit:contain;
        filter:drop-shadow(0 2px 6px rgba(0,0,0,.08));
      }
      .site-nav .nav-home-brand{
        position:absolute;
        right:-22px;
        bottom:-20px;
        width:60%;
        min-width:108px;
        max-width:208px;
        opacity:0;
        overflow:visible;
        pointer-events:none;
        z-index:2;
        transform:rotate(-17deg);
        transform-origin:100% 100%;
        transition:opacity .28s ease, transform .28s cubic-bezier(.2,.9,.2,1);
      }
      .site-nav .nav-home-brand-img{
        display:block;
        width:100%;
        height:auto;
        object-fit:contain;
      }
      .site-nav .nav-home:hover .nav-home-brand,
      .site-nav .nav-home:focus-visible .nav-home-brand{
        opacity:1;
        transform:rotate(-17deg) translate(0,0);
      }
      .site-nav .nav-home:focus-visible{
        outline:2px solid var(--nav-line);
        outline-offset:2px;
        border-radius:4px;
      }
      .site-nav .nav-cluster{
        flex:1;
        min-width:0;
        display:flex;
        align-items:center;
        justify-content:flex-end;
        flex-wrap:wrap;
        gap:clamp(14px, 3.2vw, 32px);
        row-gap:8px;
        padding:0 0 0 10px;
      }
      .site-nav .hud-btn{
        border:none;
        background:transparent;
        padding:6px 2px;
        margin:0;
        text-decoration:none;
        font:800 17px/1 Montserrat, system-ui, sans-serif;
        letter-spacing:.06em;
        text-transform:uppercase;
        color:#000;
        cursor:var(--cursor-cube), pointer;
        -webkit-appearance:none;
        appearance:none;
        box-shadow:none;
        outline:none;
        white-space:nowrap;
        transition:color .18s ease, transform .2s cubic-bezier(.34,1.56,.64,1);
      }
      .site-nav .hud-btn:hover{
        transform:translateY(-2px);
        color:var(--nav-accent);
      }
      .site-nav .hud-btn:active{
        transform:translateY(0);
      }
      .site-nav .hud-btn:focus-visible{
        outline:2px solid var(--nav-line);
        outline-offset:3px;
      }
      @media (max-width:700px){
        .site-nav{
          padding:max(8px, env(safe-area-inset-top, 0px)) 10px 14px max(8px, env(safe-area-inset-left, 0px));
          min-height:calc(94px + env(safe-area-inset-top, 0px));
        }
        .site-nav .nav-home{ padding:2px 8px 14px 10px; }
        .site-nav .nav-home-logo{
          height:66px;
          max-height:74px;
        }
        .site-nav .nav-home-brand{
          width:56%;
          min-width:90px;
          max-width:170px;
          right:-14px;
          bottom:-14px;
          transform:rotate(-15deg);
        }
        .site-nav .nav-home:hover .nav-home-brand,
        .site-nav .nav-home:focus-visible .nav-home-brand{
          transform:rotate(-15deg) translate(0,0);
        }
        .site-nav .hud-btn{ font-size:15px; }
        .site-nav .nav-cluster{
          gap:10px 12px;
        }
      }
      .card{
        width:min(680px, 100%);
        border:2px solid var(--line);
        border-radius:16px;
        padding:22px 22px 20px;
        background:#fff;
      }
      h1{
        margin:0 0 8px;
        font-size:22px;
        letter-spacing:-0.02em;
      }
      p{
        margin:0 0 14px;
        color:var(--muted);
        line-height:1.5;
      }
      a{
        color:var(--accent);
        text-decoration:underline;
        font-weight:700;
      }
    </style>
  </head>
  <body>
    <header class="site-nav" aria-label="Site navigation">
      <a class="nav-home" id="nav-home" href="./home.html" aria-label="Home">
        <span class="nav-home-visual">
          <img class="nav-home-logo" src="./home-b.svg" alt="" width="220" height="88" decoding="async" />
            <span class="nav-home-brand" aria-hidden="true">
              <img class="nav-home-brand-img" src="./home-i.svg" alt="" width="244" height="61" decoding="async" />
            </span>
        </span>
      </a>
      <div class="nav-cluster">
        <a class="hud-btn" id="nav-shop" href="./shop.html">SHOP</a>
        <a class="hud-btn" id="nav-contact" href="./contact-preview.html">CONTACT</a>
        <button class="hud-btn" id="nav-lang" type="button">中文</button>
      </div>
    </header>
    <div class="card">
      <h1 id="title">CONTACT</h1>
      <p id="desc">Email us for inquiries and collaborations.</p>
      <p>
        <a id="email" href="mailto:insufficientspace20@gmail.com">insufficientspace20@gmail.com</a>
      </p>
    </div>
    <script>
      (function(){
        const params = new URLSearchParams(window.location.search);
        let lang = (params.get('lang') === 'zh') ? 'zh' : 'en';
        const navHome = document.getElementById('nav-home');
        const shopLink = document.getElementById('nav-shop');
        const contactLink = document.getElementById('nav-contact');
        const langBtn = document.getElementById('nav-lang');
        [navHome, shopLink, contactLink].forEach((el)=>{
          if (!el) return;
          const u = new URL(el.getAttribute('href'), window.location.href);
          u.searchParams.set('lang', lang);
          el.setAttribute('href', u.pathname + u.search);
        });
        if (shopLink) shopLink.textContent = (lang === 'zh') ? '商店' : 'SHOP';
        if (contactLink) contactLink.textContent = (lang === 'zh') ? '聯絡' : 'CONTACT';
        if (langBtn){
          langBtn.textContent = (lang === 'zh') ? 'EN' : '中文';
          langBtn.addEventListener('click', ()=>{
            const next = (lang === 'zh') ? 'en' : 'zh';
            localStorage.setItem('site_lang', next);
            const u = new URL(window.location.href);
            u.searchParams.set('lang', next);
            window.location.href = u.pathname + u.search;
          });
        }
        if (lang === 'zh'){
          document.getElementById('title').textContent = '聯絡';
          document.getElementById('desc').textContent = '有任何合作與詢問，歡迎寄信。';
        }
      })();
    </script>
  </body>
</html>
