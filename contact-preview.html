<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact</title>
    <style>
      :root{
        --bg:#ffffff;
        --text:#1f2433;
        --muted:#5f6778;
        --line:#d4d8e3;
        --accent:#1A26FF;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:24px;
      }
      .card{
        width:min(680px, 100%);
        border:2px solid var(--line);
        border-radius:16px;
        padding:22px 22px 20px;
        background:#fff;
      }
      h1{
        margin:0 0 8px;
        font-size:22px;
        letter-spacing:-0.02em;
      }
      p{
        margin:0 0 14px;
        color:var(--muted);
        line-height:1.5;
      }
      a{
        color:var(--accent);
        text-decoration:underline;
        font-weight:700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="title">CONTACT</h1>
      <p id="desc">Email us for inquiries and collaborations.</p>
      <p>
        <a id="email" href="mailto:insufficientspace20@gmail.com">insufficientspace20@gmail.com</a>
      </p>
    </div>
    <script>
      (function(){
        const params = new URLSearchParams(window.location.search);
        const lang = (params.get('lang') === 'zh') ? 'zh' : 'en';
        if (lang !== 'zh') return;
        document.getElementById('title').textContent = '聯絡';
        document.getElementById('desc').textContent = '有任何合作與詢問，歡迎寄信。';
      })();
    </script>
  </body>
</html>
