<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sketch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --glass-bg: rgba(6, 15, 82, .46);
        --glass-bg-strong: rgba(8, 18, 100, .62);
        --glass-border: rgba(214,224,255,.22);
        --glass-border-hover: rgba(255,255,255,.34);
        --glass-focus: rgba(238,0,184,.45);
        --txt-dim: #c7d1ff;
      }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: #000e51;
        color: #e9ebff;
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        overflow: hidden;
        opacity:0;
        transition: opacity 260ms ease-out;
      }
      body.is-ready{
        opacity:1;
      }
      body.is-exiting{
        opacity:0;
      }
      .ui-dock{
        position: fixed;
        inset:0;
        z-index: 9999;
        pointer-events:none;
      }
      .hud-actions{
        position:absolute;
        top:14px;
        left:14px;
        right:14px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        pointer-events:none;
      }
      .hud-actions.is-game{
        gap:0;
      }
      .hud-btn {
        text-decoration: none;
        color: #ffffff;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        padding: 8px 12px;
        border-radius: 10px;
        font-weight: 800;
        font-size: 12px;
        letter-spacing: .01em;
        backdrop-filter: blur(10px);
        cursor:pointer;
        pointer-events:auto;
      }
      .hud-btn:hover { border-color: var(--glass-border-hover); }
      .hud-btn:focus-visible { outline: 3px solid var(--glass-focus); outline-offset: 2px; }
      .hud-btn.is-hidden{
        display:none !important;
      }
      .info-overlay{
        position:fixed;
        inset:0;
        z-index:9996;
        background:rgba(2,6,40,.32);
        opacity:0;
        pointer-events:none;
        transition:opacity .24s ease;
      }
      .info-overlay.is-open{
        opacity:1;
        pointer-events:auto;
      }
      .info-sheet{
        position:fixed;
        top:0;
        right:0;
        height:100vh;
        width:min(430px, 94vw);
        z-index:9997;
        transform:translateX(102%);
        transition:transform .32s cubic-bezier(.2,.9,.2,1);
        background: rgba(8, 18, 100, .82);
        border-left:1px solid var(--glass-border);
        backdrop-filter: blur(14px);
        padding:14px 14px 18px;
        display:grid;
        grid-template-rows:auto auto 1fr;
        gap:10px;
      }
      .info-sheet.is-open{
        transform:translateX(0);
      }
      .info-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:8px;
      }
      .info-title{
        margin:0;
        font-size:11px;
        font-weight:800;
        letter-spacing:.18em;
        text-transform:uppercase;
        color:var(--txt-dim);
      }
      .hud-card{
        background: var(--glass-bg);
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        padding: 11px 12px 10px;
        backdrop-filter: blur(12px);
      }
      .hud-card h2{
        margin:0 0 6px;
        font-size:10px;
        text-transform:uppercase;
        letter-spacing:.18em;
        color:var(--txt-dim);
      }
      .controls-list{
        margin:0;
        padding-left:16px;
        font-size:11px;
        line-height:1.42;
        color:#e9ebff;
      }
      .controls-list li{ margin:2px 0; }
      .controls-list code{
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size:.9em;
        background: rgba(0,0,0,.35);
        padding:1px 4px;
        border-radius:6px;
        color:#ffffff;
      }
      .controls-card{
        transition: opacity .2s ease, transform .2s ease;
      }
      .desc-card p{
        margin:0;
        color:#eff2ff;
        font-size:11px;
        line-height:1.5;
      }
      .desc-note{
        margin-top:8px !important;
        font-size:10px !important;
        color:var(--txt-dim) !important;
        letter-spacing:.02em;
      }
      @media (max-width: 700px){
        .ui-dock{
          inset:0;
        }
        .hud-actions{
          top:10px;
          left:10px;
          right:10px;
        }
        .hud-btn{
          padding:7px 10px;
          font-size:11px;
        }
        .info-sheet{
          width:100vw;
          border-left:none;
        }
        .hud-card{
          padding:9px 10px 8px;
        }
      }
      body.preview-mode .ui-dock{
        display:none !important;
      }
    </style>
  </head>
  <body>
    <section class="ui-dock" aria-label="Game HUD">
      <div class="hud-actions" id="hud-actions">
        <a class="hud-btn" href="./index.html" data-soft-nav>Home</a>
        <button class="hud-btn" type="button" id="info-toggle" aria-expanded="false" aria-controls="info-sheet">Info</button>
      </div>
    </section>
    <div class="info-overlay" id="info-overlay" aria-hidden="true"></div>
    <aside class="info-sheet" id="info-sheet" aria-label="Game information" aria-hidden="true">
      <div class="info-head">
        <h2 class="info-title">Game Info</h2>
        <button class="hud-btn" type="button" id="info-close" aria-label="Close info">Close</button>
      </div>
      <section class="hud-card controls-card" aria-label="How to play">
        <h2>Controls</h2>
        <ul class="controls-list">
          <li><code>←</code> / <code>→</code>: move</li>
          <li><code>↓</code>: soft drop</li>
          <li><code>↑</code>: rotate</li>
          <li>On mobile: use the on-screen buttons</li>
        </ul>
      </section>
      <section class="hud-card desc-card" aria-label="Game description">
        <h2>Why I Made This Game</h2>
        <p>[Edit this description later: share your story, idea, and message behind this project.]</p>
        <p class="desc-note">Tip: you can replace this text anytime in `sketch.html`.</p>
      </section>
    </aside>

    <!-- Libraries first, then the sketch -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js" type="text/javascript"></script>
    <script src="./mySketch.js.js" type="text/javascript"></script>
    <script>
      (function(){
        const PREVIEW_MODE = new URLSearchParams(window.location.search).has('preview');
        function enableSoftNav(){
          if (PREVIEW_MODE) document.body.classList.add('preview-mode');
          document.body.classList.add('is-ready');
          const links = document.querySelectorAll('a[data-soft-nav]');
          links.forEach(link=>{
            link.addEventListener('click', (ev)=>{
              const href = link.getAttribute('href');
              const target = link.getAttribute('target');
              if (!href || href.startsWith('#') || target === '_blank') return;
              ev.preventDefault();
              document.body.classList.add('is-exiting');
              setTimeout(()=>{ window.location.href = href; }, 240);
            });
          });
        }
        if (document.readyState === 'loading'){
          document.addEventListener('DOMContentLoaded', enableSoftNav);
        } else {
          enableSoftNav();
        }
      })();

      (function(){
        const infoBtn = document.getElementById('info-toggle');
        const closeBtn = document.getElementById('info-close');
        const infoSheet = document.getElementById('info-sheet');
        const infoOverlay = document.getElementById('info-overlay');
        const hudActions = document.getElementById('hud-actions');
        if (!infoBtn || !closeBtn || !infoSheet || !infoOverlay || !hudActions) return;

        function setInfoOpen(isOpen){
          infoSheet.classList.toggle('is-open', isOpen);
          infoOverlay.classList.toggle('is-open', isOpen);
          infoSheet.setAttribute('aria-hidden', String(!isOpen));
          infoOverlay.setAttribute('aria-hidden', String(!isOpen));
          infoBtn.setAttribute('aria-expanded', String(isOpen));
        }

        infoBtn.addEventListener('click', ()=>setInfoOpen(true));
        closeBtn.addEventListener('click', ()=>setInfoOpen(false));
        infoOverlay.addEventListener('click', ()=>setInfoOpen(false));
        window.addEventListener('keydown', (e)=>{
          if (e.key === 'Escape') setInfoOpen(false);
        });

        // Keep only Home visible once the user has entered gameplay.
        let lastState = null;
        setInterval(()=>{
          const state = typeof window.gameState === 'string' ? window.gameState : null;
          if (state === lastState || !state) return;
          lastState = state;
          const inGame = state !== 'input';
          infoBtn.classList.toggle('is-hidden', inGame);
          hudActions.classList.toggle('is-game', inGame);
          if (inGame) setInfoOpen(false);
        }, 180);
      })();
    </script>
  </body>
</html>
