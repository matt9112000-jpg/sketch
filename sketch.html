<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sketch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body { height: 100%; }
      body {
        margin: 0;
        background: #000e51;
        color: #e9ebff;
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        overflow: hidden;
        opacity:0;
        transition: opacity 260ms ease-out;
      }
      body.is-ready{
        opacity:1;
      }
      body.is-exiting{
        opacity:0;
      }
      .nav {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 9999;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .nav a {
        text-decoration: none;
        color: #ffffff;
        background: rgba(0,0,0,.30);
        border: 1px solid rgba(255,255,255,.14);
        padding: 10px 12px;
        border-radius: 12px;
        font-weight: 800;
        letter-spacing: .01em;
        backdrop-filter: blur(8px);
      }
      .nav a:hover { border-color: rgba(255,255,255,.28); }
      .nav a:focus-visible { outline: 3px solid rgba(238,0,184,.45); outline-offset: 2px; }
    </style>
  </head>
  <body>
    <nav class="nav" aria-label="Primary">
      <a href="./index.html" data-soft-nav>Home</a>
    </nav>

    <!-- Libraries first, then the sketch -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js" type="text/javascript"></script>
    <script src="./mySketch.js.js" type="text/javascript"></script>
    <script>
      (function(){
        function enableSoftNav(){
          document.body.classList.add('is-ready');
          const links = document.querySelectorAll('a[data-soft-nav]');
          links.forEach(link=>{
            link.addEventListener('click', (ev)=>{
              const href = link.getAttribute('href');
              const target = link.getAttribute('target');
              if (!href || href.startsWith('#') || target === '_blank') return;
              ev.preventDefault();
              document.body.classList.add('is-exiting');
              setTimeout(()=>{ window.location.href = href; }, 240);
            });
          });
        }
        if (document.readyState === 'loading'){
          document.addEventListener('DOMContentLoaded', enableSoftNav);
        } else {
          enableSoftNav();
        }
      })();
    </script>
  </body>
</html>
