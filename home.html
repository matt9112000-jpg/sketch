<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>INSUFFICIENT SPACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#ffffff;
        --text:#1f2433;
        --muted:#5f6778;
        --accent:#FF3BDA;
        --line:rgba(26,38,255,.55);
        --cursor-cube:url("./cursor-cube.svg") 9 9;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        font-family:Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        cursor:var(--cursor-cube), auto;
        overflow:hidden;
      }

      #hud{
        position:fixed;
        inset:0;
        pointer-events:none;
        z-index:100;
      }
      #ball-wrap{
        position:fixed;
        inset:0;
        z-index:10;
        pointer-events:none;
        background:transparent;
        /* Moves the 3D layer on screen; changing ballYOffset alone keeps the same view (camera follows target). */
        transform:translateY(14vh);
      }
      #ball-wrap canvas{
        pointer-events:auto;
      }
      #top-buttons{
        position:absolute;
        z-index:101;
        top:18px;
        left:18px;
        right:18px;
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        pointer-events:auto;
        user-select:none;
        -webkit-tap-highlight-color:transparent;
      }
      .hud-btn{
        border:none;
        background:transparent;
        padding:0;
        margin:0;
        font:800 18px/1.1 Montserrat, system-ui, sans-serif;
        letter-spacing:.06em;
        color:#000;
        text-transform:uppercase;
        cursor:var(--cursor-cube), pointer;
        -webkit-appearance:none;
        appearance:none;
        box-shadow:none;
        outline:none;
      }
      .hud-btn:focus-visible{
        outline:2px solid var(--line);
        outline-offset:3px;
      }
      .hud-btn small{
        display:block;
        margin-top:8px;
        font:700 11px/1.1 Montserrat, system-ui, sans-serif;
        color:var(--muted);
        letter-spacing:.16em;
        text-transform:uppercase;
      }

      .facet-tag{
        position:fixed;
        left:0;
        top:0;
        z-index:99;
        transform:translate(-50%, -130%);
        pointer-events:none;
        opacity:0;
        transition:opacity .15s ease;
        max-width:min(280px, 46vw);
        text-align:center;
      }
      .facet-tag.is-visible{
        opacity:1;
      }
      .facet-tag__link{
        pointer-events:auto;
        display:inline-block;
        font:600 11px/1.25 Montserrat, system-ui, sans-serif;
        letter-spacing:.12em;
        text-transform:uppercase;
        color:#111;
        text-decoration:none;
        border-bottom:1px solid rgba(0,0,0,.35);
        padding-bottom:2px;
        cursor:var(--cursor-cube), pointer;
      }
      .facet-tag__link:hover{
        color:var(--accent);
        border-bottom-color:var(--accent);
      }

      #preview-panel{
        position:fixed;
        left:50%;
        top:44%;
        transform:translate(-50%, -50%);
        width:min(960px, 92vw);
        height:min(600px, 62vh);
        z-index:5;
        pointer-events:none;
        background:transparent;
        opacity:0;
        transition:opacity .22s ease;
        overflow:hidden;
        -webkit-mask-image:radial-gradient(ellipse 80% 78% at 50% 46%,#000 48%,#000 74%,transparent 100%);
        mask-image:radial-gradient(ellipse 80% 78% at 50% 46%,#000 48%,#000 74%,transparent 100%);
        -webkit-mask-repeat:no-repeat;
        mask-repeat:no-repeat;
        -webkit-mask-size:100% 100%;
        mask-size:100% 100%;
      }
      #preview-panel.is-active{
        opacity:1;
      }
      #preview-frame{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        border:0;
        background:#fff;
        pointer-events:none;
      }

      #ball{
        width:100%;
        height:100%;
        display:block;
      }
    </style>
  </head>
  <body>
    <div id="ball-wrap">
      <div id="ball"></div>
    </div>

    <div id="preview-panel" aria-hidden="true">
      <iframe id="preview-frame" title="Self-introduction preview" src="about:blank"></iframe>
    </div>

    <div id="hud">
      <div id="top-buttons" aria-label="Site navigation">
        <button class="hud-btn" type="button" id="shop-btn">SHOP</button>
        <button class="hud-btn" type="button" id="contact-btn">CONTACT</button>
        <button class="hud-btn" type="button" id="lang-btn">中文</button>
      </div>
      <div id="facet-tag" class="facet-tag" aria-hidden="true">
        <a id="facet-tag-link" class="facet-tag__link" href="#">01 SELF-INTRODUCTION</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
      (function(){
        const wrap = document.getElementById('ball');
        const previewPanel = document.getElementById('preview-panel');
        const previewFrame = document.getElementById('preview-frame');
        if (!wrap || !previewPanel || !previewFrame) return;

        const shopBtn = document.getElementById('shop-btn');
        const contactBtn = document.getElementById('contact-btn');
        const langBtn = document.getElementById('lang-btn');
        const facetTag = document.getElementById('facet-tag');
        const facetTagLink = document.getElementById('facet-tag-link');

        const palette = ['#4C4C4C','#6DFF69','#FF3BDA','#FF99B1','#1A26FF','#FF4622','#FCC730'];
        const paletteLen = palette.length;

        // Language: default en, zh if ?lang=zh or localStorage site_lang === 'zh'
        const params = new URLSearchParams(window.location.search);
        const urlLang = params.get('lang');
        let lang = (urlLang === 'zh' || (!urlLang && localStorage.getItem('site_lang') === 'zh')) ? 'zh' : 'en';
        localStorage.setItem('site_lang', lang);

        function setLangLabel(){
          if (!langBtn) return;
          langBtn.textContent = (lang === 'zh') ? 'EN' : '中文';
        }
        setLangLabel();

        const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, premultipliedAlpha:false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xffffff, 0); // show iframe preview behind canvas
        wrap.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const DISCO_TILES_U = 12;
        const DISCO_TILES_V = 6;
        const TAG_FACET_IU = 9;
        const TAG_FACET_IV = 2;

        const ballRadius = 1.14;
        // World height of ball center (orbit target). Camera uses lookLift so changing only this used to cancel on-screen; lookLift sets vertical framing.
        const ballYOffset = -3.15;

        const group = new THREE.Group();
        scene.add(group);
        group.position.set(0, ballYOffset, 0);

        const orientGroup = new THREE.Group();
        const spinGroup = new THREE.Group();
        group.add(orientGroup);
        orientGroup.add(spinGroup);

        const lookLift = 1.38; // camera above orbit target → ball lower in the canvas
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 50);
        const nextOrbitTarget = new THREE.Vector3();
        nextOrbitTarget.copy(group.position);
        camera.position.set(
          group.position.x,
          group.position.y + lookLift + 0.5,
          group.position.z + 2.95
        );

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;      // orbit only
        controls.enableZoom = false;     // keep position (no dolly)
        controls.autoRotate = false;     // spin on Z inside spinGroup (after X/Y tilt)
        controls.target.copy(nextOrbitTarget);
        controls.update();

        const sphereGeom = new THREE.SphereGeometry(ballRadius, 96, 64);

        function hexToRgb(hex){
          const h = hex.replace('#','');
          const n = parseInt(h, 16);
          return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
        }
        const palRgb = palette.map(hexToRgb);

        /** Facet grid in standard sphere UV (matches SphereGeometry mapping). */
        function createDiscoBallTexture(){
          const size = 1024;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d', { willReadFrequently: true });
          const im = ctx.createImageData(size, size);
          const d = im.data;

          const perm = [0, 1, 2, 3, 4, 5, 6];
          for (let i = perm.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            const t = perm[i];
            perm[i] = perm[j];
            perm[j] = t;
          }

          const tilesU = DISCO_TILES_U;
          const tilesV = DISCO_TILES_V;
          const groutW = 0.028;

          for (let y = 0; y < size; y++){
            const v = y / (size - 1);
            for (let x = 0; x < size; x++){
              const u = x / (size - 1);

              const tu = u * tilesU;
              const tv = v * tilesV;
              const iu = Math.floor(tu);
              const iv = Math.floor(tv);
              const fu = tu - iu;
              const fv = tv - iv;

              const edge = Math.min(fu, 1 - fu, fv, 1 - fv);
              const i = (y * size + x) * 4;

              if (edge < groutW){
                const t = edge / groutW;
                const w = 248 - Math.round(t * 38);
                d[i] = w; d[i + 1] = w; d[i + 2] = w; d[i + 3] = 255;
                continue;
              }

              const seed = iu * 73 + iv * 179;
              const cIdx = perm[Math.abs(seed) % paletteLen];
              const col = palRgb[cIdx];
              const lum = (col.r + col.g + col.b) / 3;
              const vivid = lum < 95 ? 1.22 : 1.48;

              const du = fu - 0.5;
              const dv = fv - 0.5;
              const dist = Math.sqrt(du * du + dv * dv);
              const shade = 0.86 + (1 - Math.min(1, dist * 1.7)) * 0.14;

              const r = Math.min(255, Math.round(col.r * vivid * shade));
              const g = Math.min(255, Math.round(col.g * vivid * shade));
              const b = Math.min(255, Math.round(col.b * vivid * shade));

              d[i] = r;
              d[i + 1] = g;
              d[i + 2] = b;
              d[i + 3] = 255;
            }
          }

          ctx.putImageData(im, 0, 0);
          const tex = new THREE.CanvasTexture(canvas);
          if (THREE.SRGBColorSpace) tex.colorSpace = THREE.SRGBColorSpace;
          else tex.encoding = THREE.sRGBEncoding;
          tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
          return tex;
        }

        const ballTexture = createDiscoBallTexture();
        const ballMat = new THREE.MeshBasicMaterial({ map: ballTexture });
        const ballMesh = new THREE.Mesh(sphereGeom, ballMat);
        spinGroup.add(ballMesh);

        const spinRadPerSec = 0.065;
        let ballSpinZ = 0;
        let lastSpinT = performance.now();

        /** Orbit pivot = ball center. Camera follows target so drag offsets are kept when group.position changes. */
        function syncOrbitToBall(){
          nextOrbitTarget.copy(group.position);
          camera.position.x += nextOrbitTarget.x - controls.target.x;
          camera.position.y += nextOrbitTarget.y - controls.target.y;
          camera.position.z += nextOrbitTarget.z - controls.target.z;
          controls.target.copy(nextOrbitTarget);
        }

        /** Facet center in mesh space — matches SphereGeometry vertex math (same as texture UV layout). */
        function facetTileCenterLocal(iu, iv, tilesU, tilesV, radius){
          const u = (iu + 0.5) / tilesU;
          const v = (iv + 0.5) / tilesV;
          const phi = u * Math.PI * 2;
          const theta = v * Math.PI;
          return new THREE.Vector3(
            -Math.cos(phi) * Math.sin(theta),
            Math.cos(theta),
            Math.sin(phi) * Math.sin(theta)
          ).multiplyScalar(radius * 1.012);
        }
        const tagLocal = facetTileCenterLocal(
          TAG_FACET_IU, TAG_FACET_IV, DISCO_TILES_U, DISCO_TILES_V, ballRadius
        );
        const tagWorld = new THREE.Vector3();
        const tagNDC = new THREE.Vector3();
        const groupCenter = new THREE.Vector3();
        const vOut = new THREE.Vector3();
        const vToCam = new THREE.Vector3();

        let tagPreviewHover = false;

        function selfIntroHref(){
          return `./game.html?lang=${lang}`;
        }
        function selfIntroPreviewSrc(){
          const u = new URL('./game.html', window.location.href);
          u.searchParams.set('lang', lang);
          u.searchParams.set('preview', '1');
          return u.toString();
        }
        function updateFacetTagLink(){
          if (facetTagLink) facetTagLink.href = selfIntroHref();
        }
        updateFacetTagLink();

        function setTagPreviewActive(on){
          tagPreviewHover = on;
        }

        function openBackdropPreview(){
          previewPanel.classList.add('is-active');
          previewPanel.setAttribute('aria-hidden', 'false');
          const src = selfIntroPreviewSrc();
          if (previewFrame.getAttribute('src') !== src) previewFrame.src = src;
        }
        openBackdropPreview();

        if (facetTagLink){
          facetTagLink.addEventListener('mouseenter', ()=> setTagPreviewActive(true));
          facetTagLink.addEventListener('mouseleave', ()=> setTagPreviewActive(false));
          facetTagLink.addEventListener('focusin', ()=> setTagPreviewActive(true));
          facetTagLink.addEventListener('focusout', ()=> setTagPreviewActive(false));
        }

        function tick(){
          const now = performance.now();
          const dt = Math.min(0.05, (now - lastSpinT) / 1000);
          lastSpinT = now;
          if (!tagPreviewHover) ballSpinZ += dt * spinRadPerSec;
          orientGroup.rotation.x = Math.PI / 2;
          orientGroup.rotation.y = Math.PI / 2;
          orientGroup.rotation.z = Math.PI / 2;
          spinGroup.rotation.z = ballSpinZ;

          syncOrbitToBall();
          controls.update();

          if (facetTag && facetTagLink){
            ballMesh.updateMatrixWorld(true);
            tagWorld.copy(tagLocal).applyMatrix4(ballMesh.matrixWorld);
            tagNDC.copy(tagWorld).project(camera);
            const rect = renderer.domElement.getBoundingClientRect();
            const px = rect.left + (tagNDC.x * 0.5 + 0.5) * rect.width;
            const py = rect.top + (-tagNDC.y * 0.5 + 0.5) * rect.height;
            group.getWorldPosition(groupCenter);
            vOut.copy(tagWorld).sub(groupCenter).normalize();
            vToCam.copy(camera.position).sub(tagWorld).normalize();
            const facing = vOut.dot(vToCam) > 0.18;
            const inView = facing &&
              tagNDC.z > -1 && tagNDC.z < 1 &&
              tagNDC.x > -0.92 && tagNDC.x < 0.92 &&
              tagNDC.y > -0.92 && tagNDC.y < 0.92;
            facetTag.style.left = px + 'px';
            facetTag.style.top = py + 'px';
            facetTag.classList.toggle('is-visible', inView);
            facetTag.setAttribute('aria-hidden', inView ? 'false' : 'true');
          }

          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        }

        function setLang(nextLang){
          lang = nextLang;
          localStorage.setItem('site_lang', lang);
          setLangLabel();
          updateFacetTagLink();
          const src = selfIntroPreviewSrc();
          if (previewFrame.getAttribute('src') !== src) previewFrame.src = src;
        }

        if (shopBtn){
          shopBtn.addEventListener('click', ()=>{
            window.location.href = `./shop.html?lang=${lang}`;
          });
        }
        if (contactBtn){
          contactBtn.addEventListener('click', ()=>{
            window.location.href = `./contact-preview.html?lang=${lang}`;
          });
        }
        if (langBtn){
          langBtn.addEventListener('click', ()=>{
            const next = (lang === 'zh') ? 'en' : 'zh';
            setLang(next);
          });
        }

        function onResize(){
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onResize, { passive:true });

        tick();
      })();
    </script>
  </body>
</html>
