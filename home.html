<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>INSUFFICIENT SPACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#ffffff;
        --text:#1f2433;
        --muted:#5f6778;
        --accent:#FF3BDA;
        --line:rgba(26,38,255,.55);
        --cursor-cube:url("./cursor-cube.svg") 9 9;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        font-family:Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        cursor:var(--cursor-cube), auto;
        overflow:hidden;
      }

      #hud{
        position:fixed;
        inset:0;
        pointer-events:none;
        z-index:20;
      }
      #ball-wrap{
        position:fixed;
        inset:0;
        z-index:10;
      }
      #top-buttons{
        position:absolute;
        top:18px;
        left:18px;
        right:18px;
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        pointer-events:auto;
        user-select:none;
      }
      .hud-btn{
        border:none;
        background:transparent;
        padding:0;
        font:800 18px/1.1 "Space Mono", monospace;
        letter-spacing:.06em;
        color:#000;
        text-transform:uppercase;
        cursor:var(--cursor-cube), pointer;
      }
      .hud-btn small{
        display:block;
        margin-top:8px;
        font:700 11px/1.1 "Space Mono", monospace;
        color:var(--muted);
        letter-spacing:.16em;
        text-transform:uppercase;
      }

      #preview-panel{
        position:absolute;
        left:50%;
        top:54%;
        transform:translate(-50%, -50%);
        width:min(980px, 92vw);
        height:min(640px, 62vh);
        z-index:5;
        background:rgba(255,255,255,.72);
        border:none;
        border-radius:18px;
        overflow:hidden;
        opacity:0;
        pointer-events:none;
        transition:opacity .14s ease;
        backdrop-filter: blur(12px);
        box-shadow:
          0 0 0 2px rgba(26,38,255,.16),
          0 26px 80px rgba(0,0,0,.10);
      }
      #preview-panel.is-visible{
        opacity:1;
      }
      #preview-panel::before{
        content:'';
        position:absolute;
        inset:-26px;
        background:
          radial-gradient(circle at center, rgba(26,38,255,.22) 0%, rgba(26,38,255,0) 62%);
        filter: blur(18px);
        opacity:.9;
        pointer-events:none;
        z-index:0;
      }
      #preview-frame{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        border:0;
        background:#fff;
        pointer-events:none;
        z-index:1;
      }
      #ball{
        width:100%;
        height:100%;
        display:block;
      }
    </style>
  </head>
  <body>
    <div id="ball-wrap">
      <div id="ball"></div>
    </div>

    <div id="preview-panel" aria-label="Preview panel">
      <iframe id="preview-frame" title="Project preview" loading="lazy" src="about:blank"></iframe>
    </div>

    <div id="hud">
      <div id="top-buttons" aria-label="Project buttons">
        <button class="hud-btn" type="button" id="shop-btn">SHOP</button>
        <button class="hud-btn" type="button" id="contact-btn">CONTACT</button>
        <button class="hud-btn" type="button" id="lang-btn">中文</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
      (function(){
        const wrap = document.getElementById('ball');
        const previewPanel = document.getElementById('preview-panel');
        const previewFrame = document.getElementById('preview-frame');
        if (!wrap || !previewPanel || !previewFrame) return;

        const shopBtn = document.getElementById('shop-btn');
        const contactBtn = document.getElementById('contact-btn');
        const langBtn = document.getElementById('lang-btn');

        const palette = ['#4C4C4C','#6DFF69','#FF3BDA','#FF99B1','#1A26FF','#FF4622','#FCC730'];
        const paletteLen = palette.length;

        // Language: default en, zh if ?lang=zh or localStorage site_lang === 'zh'
        const params = new URLSearchParams(window.location.search);
        const urlLang = params.get('lang');
        let lang = (urlLang === 'zh' || (!urlLang && localStorage.getItem('site_lang') === 'zh')) ? 'zh' : 'en';
        localStorage.setItem('site_lang', lang);

        function setLangLabel(){
          if (!langBtn) return;
          langBtn.textContent = (lang === 'zh') ? 'EN' : '中文';
        }
        setLangLabel();

        const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xffffff, 1);
        wrap.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 50);
        camera.position.set(0, 0.8, 3.2);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;      // orbit only
        controls.enableZoom = false;     // keep position (no dolly)
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.55;
        controls.target.set(0, 0, 0);
        controls.update();

        scene.add(new THREE.HemisphereLight(0xffffff, 0xb9c7ff, 1.0));
        const key = new THREE.DirectionalLight(0xffffff, 1.15);
        key.position.set(-1.8, 2.1, 1.6);
        scene.add(key);

        // Huge ball as a textured sphere (cube-like colors via procedural texture).
        const group = new THREE.Group();
        scene.add(group);

        const ballRadius = 2.35;
        const sphereGeom = new THREE.SphereGeometry(ballRadius, 96, 64);

        function hexToRgb(hex){
          const h = hex.replace('#','');
          const n = parseInt(h, 16);
          return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
        }
        const palRgb = palette.map(hexToRgb);

        function createCubeTextureTexture(){
          const size = 768;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d', { willReadFrequently: true });
          const im = ctx.createImageData(size, size);
          const d = im.data;

          const gridScale = 15; // higher => more "cubes"
          const edgeWidth = 0.085; // edge darkening width in cell-space

          for (let y = 0; y < size; y++){
            const v = y / (size - 1);
            const phi = v * Math.PI; // 0..PI
            const sy = Math.cos(phi);
            const sinPhi = Math.sin(phi);

            for (let x = 0; x < size; x++){
              const u = x / (size - 1);
              const theta = u * Math.PI * 2; // 0..2PI

              const sx = Math.cos(theta) * sinPhi;
              const sz = Math.sin(theta) * sinPhi;

              // Map direction components [-1..1] to cell-space [0..gridScale]
              const tx = (sx * 0.5 + 0.5) * gridScale;
              const ty = (sy * 0.5 + 0.5) * gridScale;
              const tz = (sz * 0.5 + 0.5) * gridScale;

              const ix = Math.floor(tx);
              const iy = Math.floor(ty);
              const iz = Math.floor(tz);

              const cIdx = Math.abs((ix * 3 + iy * 5 + iz * 7) % paletteLen);

              const fx = tx - ix;
              const fy = ty - iy;
              const fz = tz - iz;
              const ex = Math.min(fx, 1 - fx);
              const ey = Math.min(fy, 1 - fy);
              const ez = Math.min(fz, 1 - fz);
              const edge = Math.min(ex, ey, ez);

              // Darken near cell edges for a cube-ish feel.
              const tEdge = Math.min(1, edge / edgeWidth);
              const shade = 0.62 + tEdge * 0.38;

              const col = palRgb[cIdx];
              const i = (y * size + x) * 4;
              d[i] = Math.round(col.r * shade);
              d[i + 1] = Math.round(col.g * shade);
              d[i + 2] = Math.round(col.b * shade);
              d[i + 3] = 255;
            }
          }

          ctx.putImageData(im, 0, 0);
          const tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
          return tex;
        }

        const ballTexture = createCubeTextureTexture();
        const ballMat = new THREE.MeshStandardMaterial({
          map: ballTexture,
          roughness: 0.78,
          metalness: 0.06
        });
        const ballMesh = new THREE.Mesh(sphereGeom, ballMat);
        group.add(ballMesh);

        // Interactive project cubes (separate meshes so raycasting works).
        const markerGeom = new THREE.BoxGeometry(0.22, 0.22, 0.22);
        const interactive = [];
        let selfMarker = null;
        let shopMarker = null;
        let contactMarker = null;
        const markerPositions = [
          { // self introduction
            x: 0.0,
            y: ballRadius * 1.03,
            z: 0.0,
            url: `./game.html?lang=${lang}`
          },
          { // shop
            x: ballRadius * 0.90,
            y: -ballRadius * 0.14,
            z: ballRadius * 0.68,
            url: `./shop.html?lang=${lang}`
          },
          { // contact
            x: -ballRadius * 0.80,
            y: ballRadius * 0.10,
            z: ballRadius * 0.92,
            url: `./contact-preview.html?lang=${lang}`
          }
        ];

        function addMarker(p, colorIndex){
          const mat = new THREE.MeshStandardMaterial({
            color: palette[colorIndex % paletteLen],
            roughness: 0.25,
            metalness: 0.05,
            emissive: palette[colorIndex % paletteLen],
            emissiveIntensity: 0.25
          });
          const mesh = new THREE.Mesh(markerGeom, mat);
          mesh.position.set(p.x, p.y, p.z);
          mesh.userData = { url: p.url, isMarker:true };
          group.add(mesh);
          interactive.push(mesh);
          return mesh;
        }

        selfMarker = addMarker(markerPositions[0], 2);
        shopMarker = addMarker(markerPositions[1], 4);
        contactMarker = addMarker(markerPositions[2], 6);

        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2(-10, -10);
        let hovered = null;

        const PREVIEW_PARAM = 'preview=1';
        function withPreview(url){
          try {
            const u = new URL(url, window.location.href);
            if (!u.searchParams.get('preview')) u.searchParams.set('preview', '1');
            return u.toString();
          } catch {
            if (url.includes('?')) return url + '&' + PREVIEW_PARAM;
            return url + '?' + PREVIEW_PARAM;
          }
        }

        let pendingHide = null;
        function showPreview(url){
          const src = withPreview(url);
          if (previewFrame.getAttribute('src') !== src){
            previewFrame.src = src;
          }
          previewPanel.classList.add('is-visible');
        }
        function hidePreview(){
          previewPanel.classList.remove('is-visible');
          previewFrame.src = 'about:blank';
        }

        function onPointerMove(ev){
          const rect = renderer.domElement.getBoundingClientRect();
          const x = (ev.clientX - rect.left) / rect.width;
          const y = (ev.clientY - rect.top) / rect.height;
          pointer.x = x * 2 - 1;
          pointer.y = -(y * 2 - 1);
        }

        function tick(){
          raycaster.setFromCamera(pointer, camera);
          const hits = raycaster.intersectObjects(interactive, false);
          const hit = hits[0] ? hits[0].object : null;

          if (hit !== hovered){
            // reset previous
            if (hovered){
              hovered.scale.set(1,1,1);
              if (hovered.material && hovered.material.emissive){
                hovered.material.emissiveIntensity = 0.25;
              }
            }

            hovered = hit;
            if (hovered){
              // small "pop"
              hovered.scale.set(1.08, 1.08, 1.08);
              if (hovered.material && hovered.material.emissive){
                hovered.material.emissiveIntensity = 0.55;
              }
              if (pendingHide) clearTimeout(pendingHide);
              pendingHide = null;
              showPreview(hovered.userData.url);
            } else {
              pendingHide = setTimeout(()=>hidePreview(), 120);
            }
          }

          controls.update();
          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        }

        renderer.domElement.addEventListener('pointermove', onPointerMove, { passive:true });
        renderer.domElement.addEventListener('pointerleave', ()=>{
          pointer.x = -10; pointer.y = -10;
        });

        function setLang(nextLang){
          lang = nextLang;
          localStorage.setItem('site_lang', lang);
          setLangLabel();
          if (selfMarker) selfMarker.userData.url = `./game.html?lang=${lang}`;
          if (shopMarker) shopMarker.userData.url = `./shop.html?lang=${lang}`;
          if (contactMarker) contactMarker.userData.url = `./contact-preview.html?lang=${lang}`;

          // If a marker is currently hovered, update the preview in-place.
          if (hovered && hovered.userData && hovered.userData.url){
            showPreview(hovered.userData.url);
          }
        }

        if (shopBtn){
          shopBtn.addEventListener('click', ()=>{
            window.location.href = `./shop.html?lang=${lang}`;
          });
        }
        if (contactBtn){
          contactBtn.addEventListener('click', ()=>{
            window.location.href = `./contact-preview.html?lang=${lang}`;
          });
        }
        if (langBtn){
          langBtn.addEventListener('click', ()=>{
            const next = (lang === 'zh') ? 'en' : 'zh';
            setLang(next);
          });
        }

        function onResize(){
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onResize, { passive:true });

        tick();
      })();
    </script>
  </body>
</html>
