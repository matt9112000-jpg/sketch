<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>INSUFFICIENT SPACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#ffffff;
        --text:#1f2433;
        --muted:#5f6778;
        --accent:#FF3BDA;
        --line:rgba(26,38,255,.55);
        --cursor-cube:url("./cursor-cube.svg") 9 9;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        font-family:Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        cursor:var(--cursor-cube), auto;
        overflow:hidden;
      }

      #hud{
        position:fixed;
        inset:0;
        pointer-events:none;
        z-index:100;
      }
      #ball-wrap{
        position:fixed;
        inset:0;
        z-index:10;
        pointer-events:none;
        background:transparent;
        padding-bottom:env(safe-area-inset-bottom, 0px);
        /* Moves the 3D layer on screen. If the top clips, widen FOV / pull camera back in JS (not more translate alone). */
        transform:translateY(44vh);
      }
      #ball-wrap canvas{
        pointer-events:auto;
      }
      /* Shared site nav: home-b.svg + home-i.svg (wordmark lower-right, reveal on hover) */
      .site-nav{
        position:fixed;
        z-index:101;
        top:0;
        left:0;
        right:0;
        min-height:calc(136px + env(safe-area-inset-top, 0px));
        height:auto;
        display:flex;
        align-items:flex-start;
        padding:max(0px, env(safe-area-inset-top, 0px)) max(14px, env(safe-area-inset-right, 0px)) 8px max(0px, env(safe-area-inset-left, 0px));
        background:transparent;
        pointer-events:auto;
        user-select:none;
        -webkit-tap-highlight-color:transparent;
        gap:6px;
        overflow:visible;
      }
      .site-nav .nav-home{
        flex:0 0 auto;
        display:block;
        padding:0 12px 44px 0;
        margin:-8px 0 0 0;
        text-decoration:none;
        cursor:var(--cursor-cube), pointer;
        border-radius:12px;
      }
      .site-nav .nav-home-visual{
        position:relative;
        display:inline-block;
        line-height:0;
        vertical-align:top;
        transition:transform .26s cubic-bezier(.34,1.56,.64,1);
      }
      .site-nav .nav-home:hover .nav-home-visual,
      .site-nav .nav-home:focus-visible .nav-home-visual{
        transform:translateY(-3px);
      }
      .site-nav .nav-home:active .nav-home-visual{
        transform:translateY(-1px);
        transition-duration:.12s;
      }
      .site-nav .nav-home-logo{
        display:block;
        height:88px;
        width:auto;
        max-height:98px;
        max-width:min(368px, 62vw);
        object-fit:contain;
        filter:drop-shadow(0 2px 6px rgba(0,0,0,.08));
      }
      .site-nav .nav-home-brand{
        position:absolute;
        right:-34px;
        bottom:-68px;
        width:88%;
        min-width:188px;
        max-width:340px;
        opacity:0;
        overflow:visible;
        pointer-events:none;
        z-index:2;
        transform:rotate(-17deg) translateX(20%);
        transform-origin:100% 100%;
        transition:opacity .28s ease, transform .28s cubic-bezier(.2,.9,.2,1);
      }
      .site-nav .nav-home-brand-img{
        display:block;
        width:100%;
        height:auto;
        object-fit:contain;
        transition:filter .28s ease;
      }
      .site-nav .nav-home:hover .nav-home-brand-img,
      .site-nav .nav-home:focus-visible .nav-home-brand-img{
        filter:drop-shadow(0 2px 4px rgba(0,0,0,.14)) drop-shadow(0 10px 22px rgba(0,0,0,.22));
      }
      .site-nav .nav-home:hover .nav-home-brand,
      .site-nav .nav-home:focus-visible .nav-home-brand{
        opacity:1;
        transform:rotate(-17deg) translateX(20%) translate(0,0);
      }
      .site-nav .nav-home:focus-visible{
        outline:2px solid var(--line);
        outline-offset:2px;
        border-radius:4px;
      }
      .site-nav .nav-cluster{
        flex:1;
        min-width:0;
        display:flex;
        align-items:flex-start;
        justify-content:flex-end;
        flex-wrap:nowrap;
        gap:clamp(14px, 3.2vw, 32px);
        row-gap:0;
        padding:12px 0 0 10px;
      }
      .site-nav .hud-btn{
        border:none;
        background:transparent;
        padding:2px 2px;
        margin:0;
        font:800 17px/1 Montserrat, system-ui, sans-serif;
        letter-spacing:.06em;
        color:#000;
        text-transform:uppercase;
        cursor:var(--cursor-cube), pointer;
        -webkit-appearance:none;
        appearance:none;
        box-shadow:none;
        outline:none;
        white-space:nowrap;
        transition:color .18s ease, transform .2s cubic-bezier(.34,1.56,.64,1);
      }
      .site-nav .hud-btn:hover{
        transform:translateY(-2px);
        color:var(--accent);
      }
      .site-nav .hud-btn:active{
        transform:translateY(0);
      }
      .site-nav .hud-btn:focus-visible{
        outline:2px solid var(--line);
        outline-offset:3px;
      }
      .hud-btn small{
        display:block;
        margin-top:8px;
        font:700 11px/1.1 Montserrat, system-ui, sans-serif;
        color:var(--muted);
        letter-spacing:.16em;
        text-transform:uppercase;
      }

      .facet-tag{
        position:fixed;
        left:0;
        top:0;
        z-index:99;
        transform:translate(-50%, -130%);
        pointer-events:none;
        opacity:0;
        transition:opacity .15s ease;
        max-width:min(300px, 85vw);
        text-align:center;
      }
      .facet-tag.is-visible{
        opacity:1;
      }
      .facet-tag__link{
        pointer-events:auto;
        display:inline-block;
        font:600 11px/1.25 Montserrat, system-ui, sans-serif;
        letter-spacing:.12em;
        text-transform:uppercase;
        color:#111;
        text-decoration:none;
        border-bottom:1px solid rgba(0,0,0,.35);
        padding-bottom:2px;
        cursor:var(--cursor-cube), pointer;
      }
      .facet-tag__link:hover{
        color:var(--accent);
        border-bottom-color:var(--accent);
      }

      #preview-panel{
        position:fixed;
        left:50%;
        top:50%;
        width:min(1180px, 96vw);
        height:min(780px, 78vh);
        z-index:5;
        pointer-events:none;
        background:transparent;
        opacity:0;
        transform:translate(-50%, -46%) scale(0.94);
        transform-origin:center center;
        transition:
          opacity .42s cubic-bezier(0.22, 1, 0.36, 1),
          transform .42s cubic-bezier(0.22, 1, 0.36, 1);
        overflow:hidden;
        will-change:opacity, transform;
        border-radius:14px;
        line-height:0;
        -webkit-mask-image:radial-gradient(ellipse 82% 80% at 50% 48%,#000 46%,#000 76%,transparent 100%);
        mask-image:radial-gradient(ellipse 82% 80% at 50% 48%,#000 46%,#000 76%,transparent 100%);
        -webkit-mask-repeat:no-repeat;
        mask-repeat:no-repeat;
        -webkit-mask-size:100% 100%;
        mask-size:100% 100%;
      }
      /* Stays z-index:5 — ball-wrap (10) paints on top so the sphere occludes the preview */
      #preview-panel.is-active{
        opacity:1;
        transform:translate(-50%, -50%) scale(1);
      }
      #preview-frame{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        border:0;
        margin:0;
        padding:0;
        display:block;
        background:#fff;
        pointer-events:none;
      }

      #ball{
        width:100%;
        height:100%;
        display:block;
      }
      .ball-scroll-hint{
        position:fixed;
        left:50%;
        bottom:max(18px, calc(18px + env(safe-area-inset-bottom, 0px)));
        transform:translateX(-50%);
        z-index:90;
        display:flex;
        align-items:center;
        gap:8px;
        padding:7px 12px;
        border-radius:999px;
        border:1px solid rgba(26,38,255,.22);
        background:rgba(255,255,255,.88);
        box-shadow:0 5px 18px rgba(0,0,0,.12);
        color:#151a28;
        font:700 11px/1 Montserrat, system-ui, sans-serif;
        letter-spacing:.06em;
        text-transform:uppercase;
        pointer-events:none;
        opacity:.95;
        transition:opacity .24s ease, transform .24s ease;
      }
      .ball-scroll-hint.is-hidden{
        opacity:0;
        transform:translateX(-50%) translateY(8px);
      }
      .ball-scroll-hint__drag{
        width:18px;
        height:18px;
        display:block;
      }
      .ball-scroll-hint__drag svg{
        width:100%;
        height:100%;
        display:block;
      }
      .welcome-type{
        position:fixed;
        left:50%;
        top:46%;
        transform:translate(-50%, -50%);
        z-index:4;
        pointer-events:none;
        user-select:none;
        color:#0f1220;
        font:700 10pt/1.2 Montserrat, system-ui, sans-serif;
        letter-spacing:.08em;
        text-transform:uppercase;
        text-align:center;
        white-space:nowrap;
        text-shadow:0 2px 14px rgba(255,255,255,.72);
      }
      .welcome-type::after{
        content:"";
        display:inline-block;
        width:1px;
        height:1em;
        margin-left:6px;
        background:rgba(18,22,36,.72);
        vertical-align:-0.1em;
        animation:caretBlink .9s steps(1,end) infinite;
      }
      .welcome-type.is-complete::after{
        opacity:.35;
      }
      @keyframes caretBlink{
        0%,49%{ opacity:1; }
        50%,100%{ opacity:0; }
      }
      @media (max-width:700px){
        .site-nav{
          padding:max(0px, env(safe-area-inset-top, 0px)) 10px 10px max(8px, env(safe-area-inset-left, 0px));
          min-height:calc(116px + env(safe-area-inset-top, 0px));
        }
        .site-nav .nav-home{ padding:0 8px 26px 0; margin:-5px 0 0 0; }
        .site-nav .nav-home-logo{
          height:66px;
          max-height:74px;
        }
        .site-nav .nav-home-brand{
          width:78%;
          min-width:138px;
          max-width:268px;
          right:-20px;
          bottom:-48px;
          transform:rotate(-15deg) translateX(20%);
        }
        .site-nav .nav-home:hover .nav-home-brand,
        .site-nav .nav-home:focus-visible .nav-home-brand{
          transform:rotate(-15deg) translateX(20%) translate(0,0);
        }
        .site-nav .hud-btn{ font-size:15px; }
        .site-nav .nav-cluster{
          gap:10px 12px;
        }
        .ball-scroll-hint{
          bottom:max(12px, calc(12px + env(safe-area-inset-bottom, 0px)));
          font-size:10px;
          letter-spacing:.05em;
          padding:6px 10px;
        }
        .welcome-type{
          font-size:10pt;
          width:min(92vw, 620px);
          white-space:normal;
        }
      }
    </style>
  </head>
  <body>
    <div id="ball-wrap">
      <div id="ball"></div>
    </div>

    <div id="preview-panel" aria-hidden="true">
      <iframe id="preview-frame" title="Self-introduction preview" src="about:blank"></iframe>
    </div>
    <div id="ball-scroll-hint" class="ball-scroll-hint" aria-hidden="true">
      <span class="ball-scroll-hint__drag" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M11.6 4.4a2.1 2.1 0 1 1 4.2 0v6.1l1.2-.8a1.9 1.9 0 0 1 2.6 2.7l-3.6 5.3a3.3 3.3 0 0 1-2.8 1.5h-3.4c-1 0-1.9-.4-2.6-1.1l-2.5-2.8a1.8 1.8 0 0 1 2.7-2.4l2.2 2.2V4.4z" stroke="#20263b" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.7 3.6v4.7" stroke="#20263b" stroke-width="1.65" stroke-linecap="round"/>
        </svg>
      </span>
      <span id="ball-scroll-hint-text">Drag to rotate</span>
    </div>
    <div id="welcome-type" class="welcome-type" aria-hidden="true"></div>

    <div id="hud">
      <header class="site-nav" aria-label="Site navigation">
        <a class="nav-home" href="./home.html" data-soft-nav id="nav-home" aria-label="Home">
          <span class="nav-home-visual">
            <img class="nav-home-logo" src="./home-b.svg" alt="" width="220" height="88" decoding="async" />
            <span class="nav-home-brand" aria-hidden="true">
              <img class="nav-home-brand-img" src="./home-i.svg" alt="" width="360" height="89" decoding="async" />
            </span>
          </span>
        </a>
        <div class="nav-cluster">
          <button class="hud-btn" type="button" id="shop-btn">SHOP</button>
          <button class="hud-btn" type="button" id="contact-btn">ABOUT</button>
          <button class="hud-btn" type="button" id="lang-btn">中文</button>
        </div>
      </header>
      <div id="facet-tag" class="facet-tag" aria-hidden="true">
        <a id="facet-tag-link" class="facet-tag__link" href="#">01 SELF-INTRODUCTION</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
      (function(){
        const wrap = document.getElementById('ball');
        const previewPanel = document.getElementById('preview-panel');
        const previewFrame = document.getElementById('preview-frame');
        if (!wrap || !previewPanel || !previewFrame) return;

        const navHome = document.getElementById('nav-home');
        const shopBtn = document.getElementById('shop-btn');
        const contactBtn = document.getElementById('contact-btn');
        const langBtn = document.getElementById('lang-btn');
        const facetTag = document.getElementById('facet-tag');
        const facetTagLink = document.getElementById('facet-tag-link');
        const scrollHint = document.getElementById('ball-scroll-hint');
        const scrollHintText = document.getElementById('ball-scroll-hint-text');
        const welcomeType = document.getElementById('welcome-type');

        const palette = ['#FCC730','#1A26FF','#FF4622','#FF3BDA','#6DFF69','#FF99B1','#4C4C4C'];
        const paletteLen = palette.length;

        // Language: default en, zh if ?lang=zh or localStorage site_lang === 'zh'
        const params = new URLSearchParams(window.location.search);
        const urlLang = params.get('lang');
        let lang = (urlLang === 'zh' || (!urlLang && localStorage.getItem('site_lang') === 'zh')) ? 'zh' : 'en';
        localStorage.setItem('site_lang', lang);

        function setLangLabel(){
          const shopLabel = (lang === 'zh') ? '商店' : 'SHOP';
          const contactLabel = (lang === 'zh') ? '關於' : 'ABOUT';
          const selfIntroLabel = (lang === 'zh') ? '01 自我介紹' : '01 SELF-INTRODUCTION';
          const dragLabel = (lang === 'zh') ? '拖曳旋轉' : 'Drag to rotate';
          if (shopBtn){
            shopBtn.textContent = shopLabel;
            shopBtn.setAttribute('aria-label', shopLabel);
          }
          if (contactBtn){
            contactBtn.textContent = contactLabel;
            contactBtn.setAttribute('aria-label', contactLabel);
          }
          if (facetTagLink) facetTagLink.textContent = selfIntroLabel;
          if (scrollHintText) scrollHintText.textContent = dragLabel;
          if (langBtn) langBtn.textContent = (lang === 'zh') ? 'EN' : '中文';
          if (navHome){
            const u = new URL('./home.html', window.location.href);
            u.searchParams.set('lang', lang);
            navHome.setAttribute('href', u.pathname + u.search);
          }
        }
        setLangLabel();
        // Re-apply once after first paint in case another script touches nav text.
        requestAnimationFrame(setLangLabel);

        const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, premultipliedAlpha:false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.NoToneMapping;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.setClearColor(0, 0); // always transparent clear
        wrap.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const DISCO_TILES_U = 12;
        const DISCO_TILES_V = 6;
        const TAG_FACET_IU = 9;
        const TAG_FACET_IV = 2;

        const ballRadius = 2.32;
        // World height of ball center (orbit target). Camera uses lookLift so changing only this used to cancel on-screen; lookLift sets vertical framing.
        const ballYOffset = -5.45;

        const group = new THREE.Group();
        scene.add(group);
        group.position.set(0, ballYOffset, 0);

        const orientGroup = new THREE.Group();
        const spinGroup = new THREE.Group();
        group.add(orientGroup);
        orientGroup.add(spinGroup);

        const lookLift = 2.56; // camera above orbit target → ball lower in the canvas
        const cameraFOV = 68; // wide-angle perspective
        const camera = new THREE.PerspectiveCamera(cameraFOV, window.innerWidth / window.innerHeight, 0.01, 50);
        const nextOrbitTarget = new THREE.Vector3();
        nextOrbitTarget.copy(group.position);
        camera.position.set(
          group.position.x,
          group.position.y + lookLift + 0.7,
          group.position.z + 4.75
        );

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;      // orbit only
        controls.enableZoom = false;     // keep position (no dolly)
        controls.autoRotate = false;     // spin on Z inside spinGroup (after X/Y tilt)
        controls.target.copy(nextOrbitTarget);
        controls.update();

        const sphereGeom = new THREE.SphereGeometry(ballRadius, 96, 64);

        function hexToRgb(hex){
          const h = hex.replace('#','');
          const n = parseInt(h, 16);
          return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
        }
        const palRgb = palette.map(hexToRgb);

        function tileColorIndex(iu, iv){
          const seed = iu * 73 + iv * 179;
          return Math.abs(seed) % paletteLen;
        }
        /** Facet grid in standard sphere UV (matches SphereGeometry mapping). */
        function createDiscoBallTexture(kind = 'color'){
          const size = 1024;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d', { willReadFrequently: true });
          const im = ctx.createImageData(size, size);
          const d = im.data;

          const tilesU = DISCO_TILES_U;
          const tilesV = DISCO_TILES_V;
          const groutW = 0.008;

          for (let y = 0; y < size; y++){
            const v = y / (size - 1);
            for (let x = 0; x < size; x++){
              const u = x / (size - 1);

              const tu = u * tilesU;
              const tv = v * tilesV;
              const iu = Math.floor(tu);
              const iv = Math.floor(tv);
              const fu = tu - iu;
              const fv = tv - iv;

              const edge = Math.min(fu, 1 - fu, fv, 1 - fv);
              const i = (y * size + x) * 4;

              const isTaggedTile = (iu === TAG_FACET_IU && iv === TAG_FACET_IV);

              if (edge < groutW){
                if (kind === 'gray-overlay'){
                  d[i] = 255;
                  d[i + 1] = 255;
                  d[i + 2] = 255;
                  d[i + 3] = isTaggedTile ? 0 : 255;
                } else {
                  const t = edge / groutW;
                  const w = 248 - Math.round(t * 38);
                  d[i] = w;
                  d[i + 1] = w;
                  d[i + 2] = w;
                  d[i + 3] = 255;
                }
                continue;
              }

              const cIdx = tileColorIndex(iu, iv);
              if (kind === 'gray-overlay'){
                const gray = 196; // pure gray hover mask
                const alpha = 255;
                d[i] = gray;
                d[i + 1] = gray;
                d[i + 2] = gray;
                d[i + 3] = isTaggedTile ? 0 : alpha;
              } else if (kind === 'noise'){
                const n = (Math.random() * 2 - 1) * 18;
                const c = Math.max(0, Math.min(255, Math.round(128 + n)));
                d[i] = c;
                d[i + 1] = c;
                d[i + 2] = c;
                d[i + 3] = 26;
              } else if (kind === 'tag-fx'){
                const cu = iu + fu;
                const cv = iv + fv;
                const cx = TAG_FACET_IU + 0.5;
                const cy = TAG_FACET_IV + 0.5;
                const dxRaw = Math.abs(cu - cx);
                const dx = Math.min(dxRaw, tilesU - dxRaw);
                const dy = Math.abs(cv - cy);
                const r = Math.sqrt(dx * dx + dy * dy);
                // Two-band effect: inner warm glow + outer soft shadow ring.
                let alpha = 0;
                let rr = 0, gg = 0, bb = 0;
                if (r <= 0.58){
                  const t = 1 - (r / 0.58);
                  alpha = Math.round(118 * t);
                  rr = 255; gg = 214; bb = 120;
                } else if (r <= 0.95){
                  const t = 1 - ((r - 0.58) / (0.95 - 0.58));
                  alpha = Math.round(70 * t);
                  rr = 18; gg = 18; bb = 22;
                }
                d[i] = rr;
                d[i + 1] = gg;
                d[i + 2] = bb;
                d[i + 3] = alpha;
              } else {
                const col = palRgb[cIdx];
                // Keep pure flat color per tile (no lighting/reflection simulation in texture).
                d[i] = col.r;
                d[i + 1] = col.g;
                d[i + 2] = col.b;
                d[i + 3] = 255;
              }
            }
          }

          ctx.putImageData(im, 0, 0);
          const tex = new THREE.CanvasTexture(canvas);
          if (THREE.SRGBColorSpace) tex.colorSpace = THREE.SRGBColorSpace;
          else tex.encoding = THREE.sRGBEncoding;
          tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
          return tex;
        }

        const ballTexture = createDiscoBallTexture('color');
        const grayOverlayTexture = createDiscoBallTexture('gray-overlay');
        const noiseTexture = createDiscoBallTexture('noise');
        const tagFxTexture = createDiscoBallTexture('tag-fx');
        const ballMat = new THREE.MeshBasicMaterial({ map: ballTexture });
        const ballMesh = new THREE.Mesh(sphereGeom, ballMat);
        spinGroup.add(ballMesh);
        const grayOverlayMat = new THREE.MeshBasicMaterial({
          map: grayOverlayTexture,
          transparent:true,
          opacity:0,
          depthWrite:false
        });
        const grayOverlayMesh = new THREE.Mesh(sphereGeom, grayOverlayMat);
        grayOverlayMesh.scale.setScalar(1.002);
        spinGroup.add(grayOverlayMesh);
        const noiseMat = new THREE.MeshBasicMaterial({
          map: noiseTexture,
          transparent:true,
          opacity:0.08,
          depthWrite:false
        });
        const noiseMesh = new THREE.Mesh(sphereGeom, noiseMat);
        noiseMesh.scale.setScalar(1.001);
        spinGroup.add(noiseMesh);
        const tagFxMat = new THREE.MeshBasicMaterial({
          map: tagFxTexture,
          transparent:true,
          opacity:0,
          blending:THREE.AdditiveBlending,
          depthWrite:false
        });
        const tagFxMesh = new THREE.Mesh(sphereGeom, tagFxMat);
        tagFxMesh.scale.setScalar(1.004);
        spinGroup.add(tagFxMesh);

        const spinRadPerSec = 0.065;
        let ballSpinZ = 0;
        let lastSpinT = performance.now();

        /** Orbit pivot = ball center. Camera follows target so drag offsets are kept when group.position changes. */
        function syncOrbitToBall(){
          nextOrbitTarget.copy(group.position);
          camera.position.x += nextOrbitTarget.x - controls.target.x;
          camera.position.y += nextOrbitTarget.y - controls.target.y;
          camera.position.z += nextOrbitTarget.z - controls.target.z;
          controls.target.copy(nextOrbitTarget);
        }

        /** Facet center in mesh space — matches SphereGeometry vertex math (same as texture UV layout). */
        function facetTileCenterLocal(iu, iv, tilesU, tilesV, radius){
          const u = (iu + 0.5) / tilesU;
          const v = (iv + 0.5) / tilesV;
          const phi = u * Math.PI * 2;
          const theta = v * Math.PI;
          return new THREE.Vector3(
            -Math.cos(phi) * Math.sin(theta),
            Math.cos(theta),
            Math.sin(phi) * Math.sin(theta)
          ).multiplyScalar(radius * 1.012);
        }
        const tagLocal = facetTileCenterLocal(
          TAG_FACET_IU, TAG_FACET_IV, DISCO_TILES_U, DISCO_TILES_V, ballRadius
        );
        const tagWorld = new THREE.Vector3();
        const tagNDC = new THREE.Vector3();
        const groupCenter = new THREE.Vector3();
        const vOut = new THREE.Vector3();
        const vToCam = new THREE.Vector3();

        let tagPreviewHover = false;
        let grayOverlayTargetOpacity = 0;
        let tagFxTargetOpacity = 0;

        function selfIntroHref(){
          return `./game.html?lang=${lang}`;
        }
        function selfIntroPreviewSrc(){
          const u = new URL('./game.html', window.location.href);
          u.searchParams.set('lang', lang);
          u.searchParams.set('preview', '1');
          return u.toString();
        }
        function updateFacetTagLink(){
          if (facetTagLink) facetTagLink.href = selfIntroHref();
        }
        updateFacetTagLink();

        function setTagPreviewActive(on){
          tagPreviewHover = on;
          grayOverlayTargetOpacity = on ? 1 : 0;
          tagFxTargetOpacity = on ? 1 : 0;
          if (on){
            renderer.setClearColor(0, 0);
            previewPanel.classList.add('is-active');
            previewPanel.setAttribute('aria-hidden', 'false');
            const src = selfIntroPreviewSrc();
            if (previewFrame.getAttribute('src') !== src) previewFrame.src = src;
          } else {
            renderer.setClearColor(0, 0);
            previewPanel.classList.remove('is-active');
            previewPanel.setAttribute('aria-hidden', 'true');
          }
        }

        const coarsePointer = window.matchMedia('(hover: none), (pointer: coarse)').matches;
        let welcomeTypeTimer = null;
        function startWelcomeTypewriter(){
          if (!welcomeType) return;
          const text = (lang === 'zh')
            ? '為重要的事物騰出空間。'
            : 'MAKING SPACE FOR THINGS THAT MATTER.';
          if (welcomeTypeTimer){
            clearTimeout(welcomeTypeTimer);
            welcomeTypeTimer = null;
          }
          welcomeType.classList.remove('is-complete');
          welcomeType.textContent = '';
          let idx = 0;
          const tickType = ()=>{
            if (idx < text.length){
              idx += 1;
              welcomeType.textContent = text.slice(0, idx);
              welcomeTypeTimer = window.setTimeout(tickType, 55);
            } else {
              welcomeType.classList.add('is-complete');
              welcomeTypeTimer = null;
            }
          };
          welcomeTypeTimer = window.setTimeout(tickType, 260);
        }
        startWelcomeTypewriter();

        if (facetTagLink){
          if (!coarsePointer){
            facetTagLink.addEventListener('mouseenter', ()=> setTagPreviewActive(true));
            facetTagLink.addEventListener('mouseleave', ()=> setTagPreviewActive(false));
            facetTagLink.addEventListener('focusin', ()=> setTagPreviewActive(true));
            facetTagLink.addEventListener('focusout', (e)=>{
              if (e.relatedTarget && facetTag.contains(e.relatedTarget)) return;
              setTagPreviewActive(false);
            });
          } else {
            facetTagLink.addEventListener('click', (e)=>{
              e.preventDefault();
              e.stopPropagation();
              if (tagPreviewHover){
                window.location.href = selfIntroHref();
              } else {
                setTagPreviewActive(true);
              }
            });
            document.addEventListener('click', (e)=>{
              if (!coarsePointer || !tagPreviewHover) return;
              const el = e.target;
              if (facetTag.contains(el)) return;
              if (shopBtn && shopBtn.contains(el)) return;
              if (contactBtn && contactBtn.contains(el)) return;
              if (langBtn && langBtn.contains(el)) return;
              setTagPreviewActive(false);
            }, true);
          }
        }

        function dismissScrollHint(){
          if (!scrollHint || scrollHint.classList.contains('is-hidden')) return;
          scrollHint.classList.add('is-hidden');
        }
        renderer.domElement.addEventListener('pointerdown', dismissScrollHint, { passive:true });
        renderer.domElement.addEventListener('wheel', dismissScrollHint, { passive:true });
        renderer.domElement.addEventListener('touchstart', dismissScrollHint, { passive:true });
        window.addEventListener('keydown', (e)=>{
          if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight'){
            dismissScrollHint();
          }
        });
        window.setTimeout(dismissScrollHint, 8000);

        function tick(){
          const now = performance.now();
          const dt = Math.min(0.05, (now - lastSpinT) / 1000);
          lastSpinT = now;
          grayOverlayMat.opacity += (grayOverlayTargetOpacity - grayOverlayMat.opacity) * Math.min(1, dt * 8.5);
          tagFxMat.opacity += (tagFxTargetOpacity - tagFxMat.opacity) * Math.min(1, dt * 9.5);
          if (!tagPreviewHover) ballSpinZ += dt * spinRadPerSec;
          orientGroup.rotation.x = Math.PI / 2;
          orientGroup.rotation.y = Math.PI / 2;
          orientGroup.rotation.z = Math.PI / 2;
          spinGroup.rotation.z = ballSpinZ;

          syncOrbitToBall();
          controls.update();

          if (facetTag && facetTagLink){
            ballMesh.updateMatrixWorld(true);
            tagWorld.copy(tagLocal).applyMatrix4(ballMesh.matrixWorld);
            tagNDC.copy(tagWorld).project(camera);
            const rect = renderer.domElement.getBoundingClientRect();
            const px = rect.left + (tagNDC.x * 0.5 + 0.5) * rect.width;
            const py = rect.top + (-tagNDC.y * 0.5 + 0.5) * rect.height;
            group.getWorldPosition(groupCenter);
            vOut.copy(tagWorld).sub(groupCenter).normalize();
            vToCam.copy(camera.position).sub(tagWorld).normalize();
            const facing = vOut.dot(vToCam) > 0.18;
            const inView = facing &&
              tagNDC.z > -1 && tagNDC.z < 1 &&
              tagNDC.x > -0.92 && tagNDC.x < 0.92 &&
              tagNDC.y > -0.92 && tagNDC.y < 0.92;
            facetTag.style.left = px + 'px';
            facetTag.style.top = py + 'px';
            facetTag.classList.toggle('is-visible', inView);
            facetTag.setAttribute('aria-hidden', inView ? 'false' : 'true');
          }

          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        }

        function setLang(nextLang){
          lang = nextLang;
          localStorage.setItem('site_lang', lang);
          setLangLabel();
          startWelcomeTypewriter();
          updateFacetTagLink();
          if (previewPanel.classList.contains('is-active')){
            const src = selfIntroPreviewSrc();
            if (previewFrame.getAttribute('src') !== src) previewFrame.src = src;
          }
        }

        if (shopBtn){
          shopBtn.addEventListener('click', ()=>{
            window.location.href = `./shop.html?lang=${lang}`;
          });
        }
        if (contactBtn){
          contactBtn.addEventListener('click', ()=>{
            window.location.href = `./contact-preview.html?lang=${lang}`;
          });
        }
        if (langBtn){
          langBtn.addEventListener('click', ()=>{
            const next = (lang === 'zh') ? 'en' : 'zh';
            setLang(next);
          });
        }

        function onResize(){
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onResize, { passive:true });

        tick();
      })();
    </script>
  </body>
</html>
