<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>INSUFFICIENT SPACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#ffffff;
        --text:#1f2433;
        --muted:#5f6778;
        --accent:#FF3BDA;
        --line:rgba(26,38,255,.55);
        --cursor-cube:url("./cursor-cube.svg") 9 9;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        font-family:Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        cursor:var(--cursor-cube), auto;
        overflow:hidden;
      }

      #hud{
        position:fixed;
        inset:0;
        pointer-events:none;
        z-index:20;
      }
      #ball-wrap{
        position:fixed;
        inset:0;
        z-index:10;
        pointer-events:none;
        background:transparent;
      }
      #ball-wrap canvas{
        pointer-events:auto;
      }
      #top-buttons{
        position:absolute;
        top:18px;
        left:18px;
        right:18px;
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        pointer-events:auto;
        user-select:none;
        -webkit-tap-highlight-color:transparent;
      }
      .hud-btn{
        border:none;
        background:transparent;
        padding:0;
        margin:0;
        font:800 18px/1.1 Montserrat, system-ui, sans-serif;
        letter-spacing:.06em;
        color:#000;
        text-transform:uppercase;
        cursor:var(--cursor-cube), pointer;
        -webkit-appearance:none;
        appearance:none;
        box-shadow:none;
        outline:none;
      }
      .hud-btn:focus-visible{
        outline:2px solid var(--line);
        outline-offset:3px;
      }
      .hud-btn small{
        display:block;
        margin-top:8px;
        font:700 11px/1.1 Montserrat, system-ui, sans-serif;
        color:var(--muted);
        letter-spacing:.16em;
        text-transform:uppercase;
      }

      .facet-tag{
        position:fixed;
        left:0;
        top:0;
        z-index:21;
        transform:translate(-50%, -130%);
        pointer-events:none;
        opacity:0;
        transition:opacity .15s ease;
        max-width:min(280px, 46vw);
        text-align:center;
      }
      .facet-tag.is-visible{
        opacity:1;
      }
      .facet-tag__link{
        pointer-events:auto;
        display:inline-block;
        font:600 11px/1.25 Montserrat, system-ui, sans-serif;
        letter-spacing:.12em;
        text-transform:uppercase;
        color:#111;
        text-decoration:none;
        border-bottom:1px solid rgba(0,0,0,.35);
        padding-bottom:2px;
        cursor:var(--cursor-cube), pointer;
      }
      .facet-tag__link:hover{
        color:var(--accent);
        border-bottom-color:var(--accent);
      }

      #ball{
        width:100%;
        height:100%;
        display:block;
      }
    </style>
  </head>
  <body>
    <div id="ball-wrap">
      <div id="ball"></div>
    </div>

    <div id="hud">
      <div id="top-buttons" aria-label="Site navigation">
        <button class="hud-btn" type="button" id="shop-btn">SHOP</button>
        <button class="hud-btn" type="button" id="contact-btn">CONTACT</button>
        <button class="hud-btn" type="button" id="lang-btn">中文</button>
      </div>
      <div id="facet-tag" class="facet-tag" aria-hidden="true">
        <a id="facet-tag-link" class="facet-tag__link" href="#">01 SELF-INTRODUCTION</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
      (function(){
        const wrap = document.getElementById('ball');
        if (!wrap) return;

        const shopBtn = document.getElementById('shop-btn');
        const contactBtn = document.getElementById('contact-btn');
        const langBtn = document.getElementById('lang-btn');
        const facetTag = document.getElementById('facet-tag');
        const facetTagLink = document.getElementById('facet-tag-link');

        const palette = ['#4C4C4C','#6DFF69','#FF3BDA','#FF99B1','#1A26FF','#FF4622','#FCC730'];
        const paletteLen = palette.length;

        // Language: default en, zh if ?lang=zh or localStorage site_lang === 'zh'
        const params = new URLSearchParams(window.location.search);
        const urlLang = params.get('lang');
        let lang = (urlLang === 'zh' || (!urlLang && localStorage.getItem('site_lang') === 'zh')) ? 'zh' : 'en';
        localStorage.setItem('site_lang', lang);

        function setLangLabel(){
          if (!langBtn) return;
          langBtn.textContent = (lang === 'zh') ? 'EN' : '中文';
        }
        setLangLabel();

        const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, premultipliedAlpha:false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xffffff, 1);
        wrap.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const ballRadius = 1.14;
        const ballYOffset = -1.08; // ~50% lower than prior (-0.72)

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 50);
        camera.position.set(0, ballYOffset + 0.12, 2.92);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;      // orbit only
        controls.enableZoom = false;     // keep position (no dolly)
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.55;
        controls.target.set(0, ballYOffset, 0);
        controls.update();

        scene.add(new THREE.HemisphereLight(0xffffff, 0xb9c7ff, 0.78));
        const key = new THREE.DirectionalLight(0xffffff, 0.58);
        key.position.set(-1.4, 1.6, 1.35);
        scene.add(key);

        // Textured sphere (disco mirror tiles in equirectangular / sphere UV space).
        const group = new THREE.Group();
        scene.add(group);

        const sphereGeom = new THREE.SphereGeometry(ballRadius, 96, 64);

        function hexToRgb(hex){
          const h = hex.replace('#','');
          const n = parseInt(h, 16);
          return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
        }
        const palRgb = palette.map(hexToRgb);

        /** Facet grid in standard sphere UV (matches SphereGeometry mapping). */
        function createDiscoBallTexture(){
          const size = 1024;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d', { willReadFrequently: true });
          const im = ctx.createImageData(size, size);
          const d = im.data;

          const tilesU = 12;
          const tilesV = 6;
          const groutW = 0.055;

          for (let y = 0; y < size; y++){
            const v = y / (size - 1);
            for (let x = 0; x < size; x++){
              const u = x / (size - 1);

              const tu = u * tilesU;
              const tv = v * tilesV;
              const iu = Math.floor(tu);
              const iv = Math.floor(tv);
              const fu = tu - iu;
              const fv = tv - iv;

              const edge = Math.min(fu, 1 - fu, fv, 1 - fv);
              const i = (y * size + x) * 4;

              if (edge < groutW){
                const t = edge / groutW;
                const w = 248 - Math.round(t * 38);
                d[i] = w; d[i + 1] = w; d[i + 2] = w; d[i + 3] = 255;
                continue;
              }

              const seed = iu * 73 + iv * 179;
              const cIdx = Math.abs(seed) % paletteLen;
              const col = palRgb[cIdx];
              const vivid = cIdx === 0 ? 1.18 : 1.32;

              const du = fu - 0.5;
              const dv = fv - 0.5;
              const dist = Math.sqrt(du * du + dv * dv);
              const spec = Math.pow(Math.max(0, 1 - dist * 1.85), 3.2);
              const facetShade = 0.82 + (1 - Math.min(1, dist * 1.45)) * 0.18;
              const jitter = 0.96 + ((seed * 0.001) % 1) * 0.08;

              let r = col.r * facetShade * jitter * vivid + spec * 72;
              let g = col.g * facetShade * jitter * vivid + spec * 76;
              let b = col.b * facetShade * jitter * vivid + spec * 82;

              const rim = Math.min(fu, 1 - fu, fv, 1 - fv);
              const rimDark = 0.96 + rim * 0.08;
              r *= rimDark; g *= rimDark; b *= rimDark;

              d[i] = Math.min(255, Math.round(r));
              d[i + 1] = Math.min(255, Math.round(g));
              d[i + 2] = Math.min(255, Math.round(b));
              d[i + 3] = 255;
            }
          }

          ctx.putImageData(im, 0, 0);
          const tex = new THREE.CanvasTexture(canvas);
          if (THREE.SRGBColorSpace) tex.colorSpace = THREE.SRGBColorSpace;
          else tex.encoding = THREE.sRGBEncoding;
          tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
          return tex;
        }

        const ballTexture = createDiscoBallTexture();
        const ballMat = new THREE.MeshStandardMaterial({
          map: ballTexture,
          roughness: 0.58,
          metalness: 0.18
        });
        const ballMesh = new THREE.Mesh(sphereGeom, ballMat);
        group.add(ballMesh);
        group.position.y = ballYOffset;
        group.rotation.y = Math.PI / 2;

        const tagLocal = new THREE.Vector3(0.52, 0.78, 0.35).normalize().multiplyScalar(ballRadius * 1.015);
        const tagWorld = new THREE.Vector3();
        const tagNDC = new THREE.Vector3();
        const groupCenter = new THREE.Vector3();

        function selfIntroHref(){
          return `./game.html?lang=${lang}`;
        }
        function updateFacetTagLink(){
          if (facetTagLink) facetTagLink.href = selfIntroHref();
        }
        updateFacetTagLink();

        function tick(){
          controls.update();

          if (facetTag && facetTagLink){
            group.updateMatrixWorld(true);
            tagWorld.copy(tagLocal).applyMatrix4(group.matrixWorld);
            tagNDC.copy(tagWorld).project(camera);
            const rect = renderer.domElement.getBoundingClientRect();
            const px = rect.left + (tagNDC.x * 0.5 + 0.5) * rect.width;
            const py = rect.top + (-tagNDC.y * 0.5 + 0.5) * rect.height;
            group.getWorldPosition(groupCenter);
            const outward = tagWorld.clone().sub(groupCenter).normalize();
            const toCam = camera.position.clone().sub(tagWorld).normalize();
            const facing = outward.dot(toCam) > 0.18;
            const inView = facing &&
              tagNDC.z > -1 && tagNDC.z < 1 &&
              tagNDC.x > -0.92 && tagNDC.x < 0.92 &&
              tagNDC.y > -0.92 && tagNDC.y < 0.92;
            facetTag.style.left = px + 'px';
            facetTag.style.top = py + 'px';
            facetTag.classList.toggle('is-visible', inView);
            facetTag.setAttribute('aria-hidden', inView ? 'false' : 'true');
          }

          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        }

        function setLang(nextLang){
          lang = nextLang;
          localStorage.setItem('site_lang', lang);
          setLangLabel();
          updateFacetTagLink();
        }

        if (shopBtn){
          shopBtn.addEventListener('click', ()=>{
            window.location.href = `./shop.html?lang=${lang}`;
          });
        }
        if (contactBtn){
          contactBtn.addEventListener('click', ()=>{
            window.location.href = `./contact-preview.html?lang=${lang}`;
          });
        }
        if (langBtn){
          langBtn.addEventListener('click', ()=>{
            const next = (lang === 'zh') ? 'en' : 'zh';
            setLang(next);
          });
        }

        function onResize(){
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onResize, { passive:true });

        tick();
      })();
    </script>
  </body>
</html>
