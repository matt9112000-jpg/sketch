<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#f4f4f8;
        --text:#101018;
        --muted:#73738a;
        --accent:#ff1744;
        --ring: rgba(255,23,68,.35);
        --border:#e0e0ea;
      }
      *{ box-sizing:border-box; }
      html, body{ height:100%; }
      body{
        margin:0;
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        overflow:hidden;
        opacity:0;
        transition: opacity 260ms ease-out;
      }
      body.is-ready{
        opacity:1;
      }
      body.is-exiting{
        opacity:0;
      }
      .page{
        min-height:100%;
        max-width:1040px;
        margin:0 auto;
        padding: 32px 18px 40px;
      }
      header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
        gap:10px;
      }
      .logo{
        font-weight:800;
        letter-spacing:.18em;
        text-transform:uppercase;
        font-size:12px;
      }
      .nav-links{
        display:flex;
        gap:12px;
        font-size:12px;
        text-transform:uppercase;
        letter-spacing:.16em;
      }
      .nav-links a{
        text-decoration:none;
        color:var(--muted);
      }
      .nav-links a:hover{
        color:var(--text);
      }
      .hero-title{
        font-size: clamp(30px, 5vw, 46px);
        font-weight:800;
        letter-spacing:-0.04em;
        margin: 4px 0 4px;
      }
      .hero-sub{
        margin:0;
        color:var(--muted);
        max-width:36rem;
        font-size:14px;
      }
      .list{
        margin-top:26px;
        border-top:1px solid var(--border);
      }
      .row{
        display:grid;
        grid-template-columns: 120px 54px minmax(0,1fr) 96px;
        align-items:center;
        gap:10px;
        padding: 11px 0;
        border-bottom:1px solid var(--border);
      }
      .row:hover{
        background:#ffffff;
      }
      .row-index{
        font-size:11px;
        color:var(--muted);
        letter-spacing:.16em;
        text-transform:uppercase;
      }
      .row-main{
        display:flex;
        flex-direction:column;
        gap:3px;
      }
      .row-title{
        font-weight:700;
        font-size:14px;
      }
      .row-meta{
        font-size:12px;
        color:var(--muted);
      }
      .row-cta{
        text-align:right;
      }
      .pill{
        display:inline-block;
        padding: 5px 9px;
        border-radius:999px;
        font-size:10px;
        letter-spacing:.18em;
        text-transform:uppercase;
        border:1px solid var(--border);
        color:var(--text);
        background:#fff;
      }
      .pill-live{
        border-color:var(--accent);
        color:var(--accent);
      }
      .row-link{
        position:absolute;
        inset:0;
      }
      .row-wrap{
        position:relative;
      }
      .thumb3d{
        width:120px;
        height:80px;
        border-radius:12px;
        border:1px solid var(--border);
        background:#ffffff;
        overflow:hidden;
      }
      .thumb3d canvas{
        width:100%;
        height:100%;
        display:block;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="logo">INSUFFICIENT&nbsp;SPACE</div>
        <nav class="nav-links" aria-label="Global">
          <a href="./shop.html" data-soft-nav>Shop</a>
          <a href="mailto:">Contact</a>
        </nav>
      </header>

      <section aria-label="Intro">
        <h1 class="hero-title">Experiments, games &amp; other bad ideas.</h1>
        <p class="hero-sub">
          A small file of interactive projects. Things may be broken, weird, or both.
        </p>
      </section>

      <section class="list" aria-label="Projects">
        <div class="row row-wrap" data-project-row>
          <div class="row">
            <div class="thumb3d" data-project-3d></div>
            <div class="row-index">001</div>
            <div class="row-main">
              <div class="row-title">INTRODUCTION</div>
              <div class="row-meta">A tetris-ish arcade experiment with 3D blocks &amp; leaderboard.</div>
            </div>
            <div class="row-cta">
              <span class="pill pill-live">Live</span>
            </div>
          </div>
          <a class="row-link" href="./sketch.html" data-soft-nav aria-label="Open Insufficient Space"></a>
        </div>
        <!-- Add more rows here later -->
      </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script>
      (function(){
        function enableSoftNav(){
          document.body.classList.add('is-ready');
          const links = document.querySelectorAll('a[data-soft-nav]');
          links.forEach(link=>{
            link.addEventListener('click', (ev)=>{
              const href = link.getAttribute('href');
              const target = link.getAttribute('target');
              if (!href || href.startsWith('#') || target === '_blank') return;
              ev.preventDefault();
              document.body.classList.add('is-exiting');
              setTimeout(()=>{ window.location.href = href; }, 240);
            });
          });
        }
        if (document.readyState === 'loading'){
          document.addEventListener('DOMContentLoaded', enableSoftNav);
        } else {
          enableSoftNav();
        }
      })();

      (function(){
        if (!window.THREE) return;
        const previews = [];

        function createPreview(el){
          const width = el.clientWidth || 120;
          const height = el.clientHeight || 80;
          const scene = new THREE.Scene();
          scene.background = new THREE.Color(0xffffff);

          const camera = new THREE.PerspectiveCamera(35, width/height, 0.1, 100);
          camera.position.set(2.2, 2.0, 3.5);
          camera.lookAt(0,0,0);

          const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
          renderer.setSize(width, height);
          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
          el.innerHTML = '';
          el.appendChild(renderer.domElement);

          const light1 = new THREE.DirectionalLight(0xffffff, 0.9);
          light1.position.set(3,4,5);
          scene.add(light1);
          const light2 = new THREE.DirectionalLight(0xffffff, 0.5);
          light2.position.set(-2,-3,-4);
          scene.add(light2);
          scene.add(new THREE.AmbientLight(0xffffff, 0.7));

          const group = new THREE.Group();
          const colors = [0xFCC730,0x1A26FF,0xFF4622,0xFF3BDA,0x6DFF69,0xFF99B1];
          const shape = [
            [0,0],[1,0],[0,1],[1,1]
          ];
          const geo = new THREE.BoxGeometry(0.7,0.35,0.7);
          shape.forEach(([x,y], idx)=>{
            const mat = new THREE.MeshStandardMaterial({ color: colors[idx % colors.length] });
            const m = new THREE.Mesh(geo, mat);
            m.position.set((x-0.5)*0.9, (y-0.5)*0.9, 0);
            group.add(m);
          });
          scene.add(group);

          const preview = {
            el,
            scene,
            camera,
            renderer,
            group,
            t: Math.random()*10,
            hover:false
          };
          previews.push(preview);

          const row = el.closest('[data-project-row]');
          if (row){
            row.addEventListener('mouseenter', ()=>{ preview.hover = true; });
            row.addEventListener('mouseleave', ()=>{ preview.hover = false; });
          }
        }

        function animate(){
          requestAnimationFrame(animate);
          previews.forEach(p=>{
            p.t += p.hover ? 0.08 : 0.03;
            const baseRot = p.hover ? 0.9 : 0.4;
            p.group.rotation.x = p.t * baseRot * 0.6;
            p.group.rotation.y = p.t * baseRot;
            p.group.position.y = Math.sin(p.t*1.4)*0.25;
            p.renderer.render(p.scene, p.camera);
          });
        }

        function init(){
          document.querySelectorAll('[data-project-3d]').forEach(el=>createPreview(el));
          if (previews.length){
            animate();
            window.addEventListener('resize', ()=>{
              previews.forEach(p=>{
                const w = p.el.clientWidth || 120;
                const h = p.el.clientHeight || 80;
                p.camera.aspect = w/h;
                p.camera.updateProjectionMatrix();
                p.renderer.setSize(w,h);
              });
            });
          }
        }

        if (document.readyState === 'loading'){
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
