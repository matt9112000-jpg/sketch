<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#f4f4f8;
        --text:#101018;
        --muted:#73738a;
        --accent:#ff1744;
        --ring: rgba(255,23,68,.35);
        --border:#e0e0ea;
      }
      *{ box-sizing:border-box; }
      html, body{ height:100%; }
      body{
        margin:0;
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        overflow:hidden;
        opacity:0;
        transition: opacity 260ms ease-out;
      }
      body.is-ready{
        opacity:1;
      }
      body.is-exiting{
        opacity:0;
      }
      .page{
        min-height:100%;
        max-width:1040px;
        margin:0 auto;
        padding: 32px 18px 40px;
      }
      header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
        gap:10px;
      }
      .logo{
        font-weight:800;
        letter-spacing:.18em;
        text-transform:uppercase;
        font-size:12px;
      }
      .nav-links{
        display:flex;
        gap:12px;
        font-size:12px;
        text-transform:uppercase;
        letter-spacing:.16em;
      }
      .nav-links a{
        text-decoration:none;
        color:var(--muted);
      }
      .nav-links a:hover{
        color:var(--text);
      }
      .hero-title{
        font-size: clamp(30px, 5vw, 46px);
        font-weight:800;
        letter-spacing:-0.04em;
        margin: 4px 0 4px;
      }
      .hero-sub{
        margin:0;
        color:var(--muted);
        max-width:36rem;
        font-size:14px;
      }
      .list{
        margin-top:26px;
        border-top:1px solid var(--border);
      }
      .row{
        display:grid;
        grid-template-columns: 54px minmax(0,1fr) 96px;
        align-items:center;
        gap:10px;
        padding: 11px 0;
        border-bottom:1px solid var(--border);
      }
      .row-index{
        font-size:11px;
        color:var(--muted);
        letter-spacing:.16em;
        text-transform:uppercase;
      }
      .row-main{
        display:flex;
        flex-direction:column;
        gap:3px;
      }
      .row-title{
        font-weight:700;
        font-size:14px;
      }
      .row-meta{
        font-size:12px;
        color:var(--muted);
      }
      .row-cta{
        text-align:right;
      }
      .pill{
        display:inline-block;
        padding: 5px 9px;
        border-radius:999px;
        font-size:10px;
        letter-spacing:.18em;
        text-transform:uppercase;
        border:1px solid var(--border);
        color:var(--text);
        background:#fff;
      }
      .pill-live{
        border-color:var(--accent);
        color:var(--accent);
      }
      .row-link{
        position:absolute;
        inset:0;
      }
      .row-wrap{
        position:relative;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="logo">INSUFFICIENT&nbsp;SPACE</div>
        <nav class="nav-links" aria-label="Global">
          <a href="https://github.com/matt9112000-jpg" target="_blank" rel="noreferrer">Github</a>
          <a href="mailto:">Contact</a>
        </nav>
      </header>

      <section aria-label="Intro">
        <h1 class="hero-title">Experiments, games &amp; other bad ideas.</h1>
        <p class="hero-sub">
          A small file of interactive projects. Things may be broken, weird, or both.
        </p>
      </section>

      <section class="list" aria-label="Projects">
        <div class="row row-wrap">
          <div class="row">
            <div class="row-index">001</div>
            <div class="row-main">
              <div class="row-title">Insufficient Space</div>
              <div class="row-meta">Tetris-ish arcade experiment with 3D blocks &amp; leaderboard.</div>
            </div>
            <div class="row-cta">
              <span class="pill pill-live">Live</span>
            </div>
          </div>
          <a class="row-link" href="./sketch.html" data-soft-nav aria-label="Open Insufficient Space"></a>
        </div>
        <!-- Add more rows here later -->
      </section>
    </div>

    <script>
      (function(){
        function enableSoftNav(){
          document.body.classList.add('is-ready');
          const links = document.querySelectorAll('a[data-soft-nav]');
          links.forEach(link=>{
            link.addEventListener('click', (ev)=>{
              const href = link.getAttribute('href');
              const target = link.getAttribute('target');
              if (!href || href.startsWith('#') || target === '_blank') return;
              ev.preventDefault();
              document.body.classList.add('is-exiting');
              setTimeout(()=>{ window.location.href = href; }, 240);
            });
          });
        }
        if (document.readyState === 'loading'){
          document.addEventListener('DOMContentLoaded', enableSoftNav);
        } else {
          enableSoftNav();
        }
      })();
    </script>
  </body>
</html>
