<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#f4f4f8;
        --text:#101018;
        --muted:#73738a;
        --accent:#ff1744;
        --ring: rgba(255,23,68,.35);
        --border:#e0e0ea;
      }
      *{ box-sizing:border-box; }
      html, body{ height:100%; }
      body{
        margin:0;
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        opacity:0;
        transition: opacity 260ms ease-out;
      }
      body.is-ready{ opacity:1; }
      body.is-exiting{ opacity:0; }
      .wrap{
        min-height:100%;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:28px 18px;
      }
      .stage{
        width:min(980px, 100%);
        min-height:640px;
        background:#ffffff;
        border-radius:24px;
        border:1px solid var(--border);
        position:relative;
        overflow:hidden;
      }
      .stage::before{
        content:"";
        position:absolute;
        inset:0;
        background: radial-gradient(800px 240px at 50% 100%, rgba(26,38,255,.05), transparent 60%);
        pointer-events:none;
      }
      .stage-head{
        position:absolute;
        top:24px;
        left:24px;
        right:24px;
        z-index:2;
      }
      .home-btn{
        position:absolute;
        top:24px;
        right:24px;
        z-index:3;
        border:1px solid #d3d7e5;
        border-radius:10px;
        background:#ffffff;
        color:#1a1f30;
        padding:7px 11px;
        font-size:11px;
        font-weight:700;
        letter-spacing:.04em;
        text-decoration:none;
      }
      .home-btn:hover{
        border-color:#aeb7d1;
      }
      h1{
        margin:0 0 8px;
        font-size: clamp(26px, 4vw, 34px);
        letter-spacing:-0.04em;
      }
      p{
        margin:0;
        color:var(--muted);
        font-size:14px;
        line-height:1.5;
      }
      .viewer-shell{
        position:absolute;
        left:50%;
        top:48%;
        width:min(860px, 92vw);
        height:min(620px, 70vh);
        transform: translate(-50%, -50%) scale(0.72);
        transform-origin: center center;
        transition: transform 620ms cubic-bezier(.2,.9,.2,1), filter 320ms ease;
        z-index:2;
        filter: drop-shadow(0 14px 26px rgba(0,0,0,.10));
      }
      .viewer-shell.is-active{
        transform: translate(-50%, -50%) scale(1);
        filter: drop-shadow(0 22px 44px rgba(0,0,0,.16));
      }
      .viewer{
        width:100%;
        height:100%;
        border-radius:14px;
        background: transparent;
      }
      .product-body{
        position:absolute;
        left:50%;
        top:74%;
        width:min(460px, calc(100% - 36px));
        transform: translate(-50%, 26px);
        opacity:0;
        transition: transform 440ms cubic-bezier(.2,.9,.2,1), opacity 280ms ease;
        background: rgba(255,255,255,.92);
        border:1px solid var(--border);
        border-radius:14px;
        padding:12px 14px 14px;
        z-index:2;
        pointer-events:none;
      }
      .product-body.is-active{
        transform: translate(-50%, 0);
        opacity:1;
        pointer-events:auto;
      }
      .product-title{
        margin:0;
        font-size:15px;
        font-weight:800;
      }
      .product-top{
        display:flex;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
      }
      .limited-badge{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:4px 8px;
        border-radius:999px;
        border:1px solid #f2c65f;
        background:#fff6dc;
        color:#7a5713;
        font-size:11px;
        font-weight:800;
        letter-spacing:.05em;
        text-transform:uppercase;
      }
      .product-meta{
        margin-top:6px;
        font-size:12px;
        color:var(--muted);
      }
      .product-actions{
        margin-top:10px;
        display:flex;
        gap:8px;
      }
      .product-actions button{
        border:1px solid #d3d7e5;
        border-radius:10px;
        background:#ffffff;
        color:#1a1f30;
        padding:7px 10px;
        font-size:11px;
        font-weight:700;
        letter-spacing:.04em;
        cursor:pointer;
      }
      .product-actions button:hover{
        border-color:#aeb7d1;
      }
      #add-cart-btn{
        background:#121827;
        border-color:#121827;
        color:#ffffff;
      }
      #add-cart-btn:hover{
        border-color:#2b3755;
        background:#1a2440;
      }
      .hint{
        position:absolute;
        left:50%;
        bottom:16px;
        transform: translateX(-50%);
        font-size:11px;
        letter-spacing:.14em;
        text-transform:uppercase;
        color:var(--muted);
        z-index:2;
      }
      @media (max-width: 700px){
        .wrap{ padding:12px 10px; }
        .stage{ min-height: calc(100vh - 24px); }
        .home-btn{
          top:16px;
          right:14px;
        }
        .viewer-shell{
          left:50%;
          top:44%;
          width:min(94vw, 520px);
          height:min(60vh, 560px);
          transform: translate(-50%, -50%) scale(0.94);
        }
        .viewer-shell.is-active{
          transform: translate(-50%, -50%) scale(1.0);
        }
        .product-body{
          top:74%;
          width:min(94vw, 520px);
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="stage" aria-label="Product stage" id="product-stage">
        <a class="home-btn" href="./index.html">Home</a>
        <div class="stage-head">
          <h1>Shop</h1>
          <p>Clean stage preview. Move cursor near model.</p>
        </div>
        <div class="viewer-shell" id="viewer-shell">
          <div id="box-viewer" class="viewer"></div>
        </div>
        <div class="product-body" id="product-info">
          <div class="product-top">
            <h2 class="product-title">001 — CCC  $120</h2>
            <span class="limited-badge">25 Limited</span>
          </div>
          <p class="product-meta">Material : 3D Printing</p>
          <div class="product-actions">
            <button id="add-cart-btn" type="button">Add Cart</button>
          </div>
        </div>
        <div class="hint">Hover near the model</div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
      (function(){
        document.body.classList.add('is-ready');
        const stage = document.getElementById('product-stage');
        const shell = document.getElementById('viewer-shell');
        const info = document.getElementById('product-info');
        const mount = document.getElementById('box-viewer');
        if (!mount || !stage || !shell || !info || !window.THREE || !THREE.GLTFLoader || !THREE.OrbitControls) return;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, mount.clientWidth / mount.clientHeight, 0.01, 100);
        camera.position.set(1.05, 0.65, 1.45);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(mount.clientWidth, mount.clientHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.86;
        mount.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x97a3b5, 0.92));
        scene.add(new THREE.AmbientLight(0xffffff, 0.42));
        const key = new THREE.DirectionalLight(0xffffff, 0.58);
        key.position.set(-1.1, 1.35, 1.3);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0xecf3ff, 0.42);
        fill.position.set(1.35, 0.8, 1.45);
        scene.add(fill);
        const rim = new THREE.DirectionalLight(0xffffff, 0.22);
        rim.position.set(0, 1.0, -1.55);
        scene.add(rim);
        const leftFill = new THREE.DirectionalLight(0xf6f9ff, 0.16);
        leftFill.position.set(-1.8, 0.35, 0.6);
        scene.add(leftFill);
        const rightFill = new THREE.DirectionalLight(0xf6f9ff, 0.16);
        rightFill.position.set(1.8, 0.35, 0.6);
        scene.add(rightFill);
        const topSoft = new THREE.PointLight(0xffffff, 0.1, 6);
        topSoft.position.set(0, 1.8, 0.85);
        scene.add(topSoft);
        const frontLight = new THREE.DirectionalLight(0xffffff, 0.34);
        frontLight.position.set(0, 0.3, 2.2);
        scene.add(frontLight);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = true;
        controls.enableRotate = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.32;
        controls.minDistance = 1.15;
        controls.maxDistance = 3.8;
        let rotateResumeAt = 0;
        controls.addEventListener('start', ()=>{
          controls.autoRotate = false;
        });
        controls.addEventListener('end', ()=>{
          rotateResumeAt = performance.now() + 1000;
        });
        function focusControlsOnMeshes(root, parts){
          const box = new THREE.Box3();
          const isMobile = window.innerWidth <= 700;
          const focus = isMobile ? [] : (parts && parts['1'] ? parts['1'] : []).concat(parts && parts['2'] ? parts['2'] : []);
          if (focus.length){
            focus.forEach((m)=>box.expandByObject(m));
          } else {
            box.setFromObject(root);
          }
          if (box.isEmpty()) return;
          const center = box.getCenter(new THREE.Vector3());
          const offset = new THREE.Vector3().subVectors(camera.position, controls.target);
          controls.target.copy(center);
          camera.position.copy(center.clone().add(offset));
          controls.update();
        }

        const silverMat = new THREE.MeshPhysicalMaterial({
          color: '#e8ecf4',
          metalness: 0.72,
          roughness: 0.22,
          clearcoat: 0.62,
          clearcoatRoughness: 0.14,
          envMapIntensity: 0.95
        });

        function getPartIdFromName(name){
          const n = (name || '').trim();
          if (n === '1' || n === '2' || n === '3') return n;
          const m = n.match(/(?:^|[^0-9])0*([123])(?:[^0-9]|$)/);
          return m ? m[1] : null;
        }
        function collectPartMeshes(root){
          const parts = { '1':[], '2':[], '3':[], other:[] };
          const allMeshes = [];
          const unnamed = [];
          const meshVolume = (mesh)=>{
            const b = new THREE.Box3().setFromObject(mesh);
            const s = b.getSize(new THREE.Vector3());
            return Math.max(0, s.x * s.y * s.z);
          };
          root.traverse((o)=>{
            if (!o.isMesh) return;
            allMeshes.push(o);
            const id = getPartIdFromName(o.name);
            if (id) parts[id].push(o);
            else {
              parts.other.push(o);
              unnamed.push(o);
            }
          });
          // Fallback / repair: fill missing parts by volume rank.
          const byVolDesc = allMeshes.slice().sort((a,b)=>meshVolume(b)-meshVolume(a));
          const used = new Set(parts['1'].concat(parts['2'], parts['3']));
          const firstUnused = ()=>byVolDesc.find((m)=>!used.has(m)) || null;
          const smallestUnused = ()=>byVolDesc.slice().reverse().find((m)=>!used.has(m)) || null;
          if (!parts['1'].length){
            const m = firstUnused();
            if (m){ parts['1'].push(m); used.add(m); }
          }
          if (!parts['2'].length){
            const m = firstUnused();
            if (m){ parts['2'].push(m); used.add(m); }
          }
          if (!parts['3'].length){
            const m = smallestUnused();
            if (m){ parts['3'].push(m); used.add(m); }
          }
          parts.other = allMeshes.filter((m)=>!used.has(m));
          return parts;
        }
        const blackMat = new THREE.MeshPhysicalMaterial({
          color: '#050506',
          metalness: 0.02,
          roughness: 0.9,
          clearcoat: 0.02,
          clearcoatRoughness: 0.9
        });
        const modelState = { caseVisible:true, showPart3:true, parts:null, part3Node:null };
        const caseBtn = document.getElementById('case-toggle-btn');
        const part3Btn = document.getElementById('part3-toggle-btn');

        function applyShopParts(){
          if (!modelState.parts) return;
          const parts = modelState.parts;
          parts['1'].forEach((m)=>{ m.material = silverMat; m.visible = modelState.caseVisible; });
          parts['2'].forEach((m)=>{ m.material = silverMat; m.visible = true; });
          parts['3'].forEach((m)=>{ m.material = blackMat; m.visible = modelState.showPart3; });
          parts.other.forEach((m)=>{ m.material = silverMat; m.visible = true; });
          if (modelState.part3Node){
            modelState.part3Node.visible = modelState.showPart3;
            modelState.part3Node.traverse((o)=>{ if (o.isMesh){ o.material = blackMat; o.visible = modelState.showPart3; } });
          }
          if (caseBtn){
            caseBtn.textContent = 'Case: ' + (modelState.caseVisible ? 'On' : 'Off');
            if (!parts['1'].length){
              caseBtn.disabled = true;
              caseBtn.style.opacity = '0.55';
            }
          }
          if (part3Btn){
            part3Btn.textContent = 'Part 3: ' + (modelState.showPart3 ? 'On' : 'Off');
            const hasPart3 = (parts['3'] && parts['3'].length) || !!modelState.part3Node;
            if (!hasPart3){
              part3Btn.disabled = true;
              part3Btn.style.opacity = '0.55';
            }
          }
        }
        if (caseBtn){
          caseBtn.addEventListener('click', ()=>{
            modelState.caseVisible = !modelState.caseVisible;
            applyShopParts();
          });
        }
        if (part3Btn){
          part3Btn.addEventListener('click', ()=>{
            modelState.showPart3 = !modelState.showPart3;
            applyShopParts();
          });
        }

        const loader = new THREE.GLTFLoader();
        const loadGlb = (url)=>new Promise((resolve, reject)=>{
          loader.load(url, resolve, undefined, reject);
        });
        const meshListOf = (obj)=>{
          const arr = [];
          obj.traverse((o)=>{ if (o.isMesh) arr.push(o); });
          return arr;
        };
        let modelRoot = null;
        const finalizeRoot = (root, parts)=>{
          modelState.parts = parts;
          applyShopParts();

          const box = new THREE.Box3().setFromObject(root);
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          root.scale.setScalar(0.799 / maxDim); // 15% smaller than previous size
          root.updateWorldMatrix(true, true);
          const centered = new THREE.Box3().setFromObject(root);
          const center = centered.getCenter(new THREE.Vector3());
          root.position.sub(center);
          root.position.x += 0.30; // 30% more right than previous movement
          root.position.y += 0.0;
          root.updateWorldMatrix(true, true);
          focusControlsOnMeshes(root, parts);

          modelRoot = root;
          scene.add(root);
        };

        (async ()=>{
          try {
            const [caseGltf, panelGltf, part3Gltf] = await Promise.all([
              loadGlb('./box_case.glb'),
              loadGlb('./box_panel.glb'),
              loadGlb('./box_part3.glb'),
            ]);
            const root = new THREE.Group();
            root.add(caseGltf.scene);
            root.add(panelGltf.scene);
            root.add(part3Gltf.scene);
            modelState.part3Node = part3Gltf.scene;

            const p1 = meshListOf(caseGltf.scene);
            const p2 = meshListOf(panelGltf.scene);
            const p3 = meshListOf(part3Gltf.scene);
            const used = new Set([].concat(p1, p2, p3));
            const all = meshListOf(root);
            const parts = { '1':p1, '2':p2, '3':p3, other: all.filter((m)=>!used.has(m)) };
            finalizeRoot(root, parts);
          } catch (splitErr){
            console.warn('split model load failed, fallback to box.glb', splitErr);
            modelState.part3Node = null;
            try {
              const gltf = await loadGlb('./box.glb');
              const root = gltf.scene;
              const parts = collectPartMeshes(root);
              finalizeRoot(root, parts);
            } catch (err){
              mount.innerHTML = '<div style="display:flex;height:100%;align-items:center;justify-content:center;color:#73738a;font-size:12px;">Unable to load split model or box.glb</div>';
            }
          }
        })();

        let active = false;
        function setActive(v){
          if (active === v) return;
          active = v;
          shell.classList.toggle('is-active', active);
          info.classList.toggle('is-active', active);
        }

        function checkProximity(clientX, clientY){
          const r = shell.getBoundingClientRect();
          const cx = r.left + r.width/2;
          const cy = r.top + r.height/2;
          const dx = clientX - cx;
          const dy = clientY - cy;
          const dist = Math.hypot(dx, dy);
          const ir = info.getBoundingClientRect();
          const inInfo = clientX >= ir.left && clientX <= ir.right && clientY >= ir.top && clientY <= ir.bottom;
          setActive(dist < 280 || inInfo);
        }

        stage.addEventListener('pointermove', (e)=>checkProximity(e.clientX, e.clientY));
        stage.addEventListener('pointerleave', ()=>setActive(false));
        stage.addEventListener('pointerdown', ()=>setActive(true));
        info.addEventListener('pointerenter', ()=>setActive(true));
        info.addEventListener('pointermove', ()=>setActive(true));

        function tick(){
          if (rotateResumeAt && performance.now() >= rotateResumeAt){
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.32;
            rotateResumeAt = 0;
          }
          controls.update();
          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        }
        tick();

        window.addEventListener('resize', ()=>{
          const w = mount.clientWidth;
          const h = mount.clientHeight;
          renderer.setSize(w, h);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        });
      })();
    </script>
  </body>
</html>
