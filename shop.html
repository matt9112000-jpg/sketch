<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:ital,wght@1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#000e51;
        --text:#f4f6ff;
        --muted:#b8beff;
        --accent:#ee00b8;
        --ring: rgba(238,0,184,.35);
        --border:#3340a8;
        --c1:#4C4C4C;
        --c2:#6DFF69;
        --c3:#FF3BDA;
        --c4:#FF99B1;
        --c5:#1A26FF;
        --c6:#FF4622;
        --c7:#FCC730;
        --cursor-cube:url("./cursor-cube.svg") 9 9;
      }
      *{ box-sizing:border-box; }
      html, body{ height:100%; }
      body{
        margin:0;
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        cursor:var(--cursor-cube), auto;
        opacity:0;
        transition: opacity 260ms ease-out;
      }
      a, button, .viewer-shell, .product-body{
        cursor:var(--cursor-cube), pointer;
      }
      body.is-ready{ opacity:1; }
      body.is-exiting{ opacity:0; }
      .wrap{
        min-height:100%;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:28px 18px;
        position:relative;
        overflow:hidden;
      }
      .page-grid{
        position:absolute;
        inset:0;
        z-index:0;
        overflow:hidden;
        pointer-events:none;
        opacity:1;
      }
      .page-grid-row{
        position:absolute;
        left:0;
        width:100%;
        overflow:hidden;
      }
      .page-grid-track{
        display:flex;
        width:max-content;
      }
      .page-grid-cell{
        flex:0 0 var(--grid-size);
        width:var(--grid-size);
        height:var(--grid-size);
        transition:background-color .22s ease, filter .22s ease;
      }
      .page-grid-cell.is-flash{
        filter:brightness(1.25) saturate(1.15);
      }
      .stage{
        width:min(980px, 100%);
        min-height:640px;
        background:#f3f3f3;
        border-radius:24px;
        border:none;
        position:relative;
        overflow:hidden;
        z-index:1;
      }
      .stage::before{
        content:"";
        position:absolute;
        inset:0;
        background:
          radial-gradient(820px 280px at 50% 100%, rgba(190,196,209,.56), transparent 64%),
          radial-gradient(560px 260px at 8% 8%, rgba(224,228,236,.8), transparent 72%);
        z-index:1;
        opacity:1;
        transition: opacity .42s ease;
        pointer-events:none;
      }
      #preview-photo-bg{
        position:absolute;
        inset:0;
        background-image:url('./shop-assets/card-2.png');
        background-size:cover;
        background-position:center;
        filter: saturate(1.02) contrast(1.04) brightness(1.04);
        opacity:0;
        transition: opacity .42s ease;
        z-index:1;
        pointer-events:none;
      }
      .stage.is-bg-preview #preview-photo-bg{
        opacity:1;
      }
      .stage.is-bg-preview::before{
        opacity:0;
      }
      .stage-head{
        position:absolute;
        top:24px;
        left:24px;
        right:24px;
        z-index:3;
      }
      .home-btn{
        position:absolute;
        top:24px;
        right:24px;
        z-index:4;
        border:none;
        border-radius:10px;
        background:var(--c5);
        color:#f4f6ff;
        padding:7px 11px;
        font-size:11px;
        font-weight:700;
        letter-spacing:.04em;
        text-decoration:none;
      }
      .home-btn:hover{
        background:#1f2be6;
      }
      .home-btn:active,
      .home-btn:focus-visible{
        background:#2632ff;
      }
      h1{
        margin:0 0 8px;
        font-size: clamp(26px, 4vw, 34px);
        letter-spacing:-0.04em;
        color:var(--c5);
      }
      p{
        margin:0;
        color:#5f6778;
        font-size:14px;
        line-height:1.5;
      }
      .viewer-shell{
        position:absolute;
        left:50%;
        top:50%;
        width:min(820px, 92vw);
        height:min(560px, 60vh);
        transform: translate(-50%, -50%) scale(0.72);
        transform-origin: center center;
        transition: transform 620ms cubic-bezier(.2,.9,.2,1), filter 320ms ease;
        z-index:2;
        filter: drop-shadow(0 14px 26px rgba(0,0,0,.10));
      }
      .viewer-shell.is-active{
        transform: translate(-50%, -50%) scale(1);
        filter: drop-shadow(0 22px 44px rgba(0,0,0,.16));
      }
      .viewer-shell.is-info-hover{
        transform: translate(-50%, -50%) scale(1.06);
      }
      .viewer{
        width:100%;
        height:100%;
        border-radius:14px;
        background: transparent;
      }
      .product-body{
        position:absolute;
        left:50%;
        top:74%;
        width:min(460px, calc(100% - 36px));
        transform: translate(-50%, 26px);
        opacity:0;
        transition: transform 440ms cubic-bezier(.2,.9,.2,1), opacity 280ms ease;
        background: rgba(255,255,255,.9);
        border-radius:14px;
        padding:12px 14px 14px;
        z-index:3;
        pointer-events:none;
      }
      .product-body.is-active{
        transform: translate(-50%, 0);
        opacity:1;
        pointer-events:auto;
      }
      .product-title{
        margin:0;
        font-size:16px;
        font-weight:800;
        letter-spacing:.01em;
        color:var(--c5);
      }
      .edition-tag{
        display:inline-flex;
        align-items:center;
        justify-content:flex-start;
        text-align:left;
        margin-top:6px;
        padding:4px 10px;
        border-radius:999px;
        background:rgba(26, 38, 255, 0.1);
        color:var(--c5);
        font-size:10px;
        font-family:'Space Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-weight:700;
        letter-spacing:.08em;
        text-transform:uppercase;
      }
      .product-top{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        flex-wrap:wrap;
      }
      .product-left{
        display:flex;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
      }
      .product-price{
        font-family:'Space Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-style:normal;
        font-weight:700;
        font-size:clamp(17px, 2.55vw, 22px);
        line-height:1;
        color:var(--c3);
        letter-spacing:.01em;
        text-shadow:0 0 12px rgba(255,59,218,.22);
      }
      .product-price .currency-unit{
        font-size:.46em;
        margin-left:.08em;
        letter-spacing:.03em;
        opacity:.88;
      }
      .product-price .currency-unit.twd{
        font-size:.42em;
      }
      .limited-badge{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:4px 8px;
        border-radius:999px;
        border:none;
        background:rgba(238,0,184,.18);
        color:#ffd3f4;
        font-size:11px;
        font-weight:800;
        letter-spacing:.05em;
        text-transform:uppercase;
      }
      .product-meta{
        margin-top:8px;
        font-size:12px;
        color:#3f4553;
      }
      .product-actions{
        margin-top:10px;
        display:flex;
        gap:8px;
      }
      .product-photo{
        width:100%;
        margin-top:12px;
        border-radius:14px;
        background:rgba(255,255,255,.88);
        padding:10px;
        object-fit:cover;
        aspect-ratio: 16 / 10;
        filter: saturate(1.02) contrast(1.04) brightness(1.03);
        opacity:.92;
        mix-blend-mode:multiply;
        user-select:none;
        pointer-events:none;
      }
      .product-photo-stack{
        display:none;
        position:absolute;
        left:14px;
        right:14px;
        top:44px;
        margin-top:0;
        width:auto;
        aspect-ratio: 16 / 10;
        opacity:0;
        transform:none;
        transition:none;
        pointer-events:none;
        z-index:10;
      }
      .product-body.is-photo-ready .product-photo-stack{
        opacity:1;
        transform: translateY(0);
        pointer-events:auto;
      }
      .product-photo-card{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        object-fit:cover;
        border-radius:14px;
        padding:10px;
        background:rgba(255,255,255,.88);
        filter: saturate(1.02) contrast(1.04) brightness(1.03);
        mix-blend-mode:multiply;
        user-select:none;
        pointer-events:auto;
        cursor:pointer;
        transform-origin:50% 70%;
        transition: transform .55s cubic-bezier(.2,.9,.2,1), opacity .35s ease;
        opacity:0;
        box-shadow: 0 12px 30px rgba(0,0,0,.06);
      }
      /* Collapsed / preview state: only the main card is visible */
      .product-body.is-photo-ready .product-photo-card.card-main{
        opacity:1;
        transform: translate(0,0) rotate(0deg) scale(1.02);
        z-index:3;
      }
      .product-body.is-photo-ready .product-photo-card.card-left,
      .product-body.is-photo-ready .product-photo-card.card-right{
        opacity:0;
        transform: translate(0, 14px) rotate(0deg) scale(.98);
        z-index:1;
      }
      /* Clicked state: cards fly out */
      .product-body.is-cards-out .product-photo-card.card-left{
        opacity:1;
        transform: translate(-38px,-62px) rotate(-12deg) scale(1);
        z-index:4;
      }
      .product-body.is-cards-out .product-photo-card.card-main{
        opacity:1;
        transform: translate(0,-34px) rotate(0deg) scale(1.04);
        z-index:5;
      }
      .product-body.is-cards-out .product-photo-card.card-right{
        opacity:1;
        transform: translate(38px,-62px) rotate(12deg) scale(1);
        z-index:3;
      }
      .product-photo-card.is-front{
        z-index:8 !important;
        transform: translate(0,-56px) rotate(0deg) scale(1.10) !important;
        box-shadow: 0 18px 46px rgba(0,0,0,.10);
      }
      .product-actions button{
        border:none;
        border-radius:10px;
        background:var(--c1);
        color:#ffffff;
        padding:7px 10px;
        font-size:11px;
        font-weight:700;
        letter-spacing:.04em;
        cursor:pointer;
      }
      .product-actions button:hover{
        background:#2a2a2a;
      }
      #add-cart-btn{
        background:var(--c3);
        color:#ffffff;
      }
      #add-cart-btn:hover{
        background:var(--c6);
      }
      .cart-sheet{
        position:fixed;
        inset:0;
        z-index:99999;
        pointer-events:none;
      }
      .cart-sheet::before{
        content:"";
        position:absolute;
        inset:0;
        background:rgba(2,6,28,.45);
        opacity:0;
        transition:opacity .24s ease;
      }
      .cart-sheet.is-open{
        pointer-events:auto;
      }
      .cart-sheet.is-open::before{
        opacity:1;
      }
      .cart-panel{
        position:absolute;
        top:0;
        right:0;
        width:min(390px, 100vw);
        height:100%;
        background:linear-gradient(165deg, #ffffff 0%, #f2f4f8 100%);
        border-left:none;
        box-shadow:-16px 0 32px rgba(0,0,0,.28);
        transform:translateX(100%);
        transition:transform .28s cubic-bezier(.2,.9,.2,1);
        display:flex;
        flex-direction:column;
      }
      .cart-sheet.is-open .cart-panel{
        transform:translateX(0);
      }
      .cart-head{
        padding:18px 16px 12px;
        border-bottom:none;
      }
      .cart-head h3{
        margin:0 0 4px;
        font-size:18px;
        font-weight:800;
      }
      .cart-head p{
        margin:0;
        font-size:12px;
        color:#4d5670;
      }
      .cart-body{
        padding:12px 16px;
        flex:1;
      }
      .cart-summary{
        border-radius:12px;
        background:rgba(26,38,255,.06);
        padding:10px 12px;
      }
      .checkout-row{
        display:flex;
        justify-content:space-between;
        align-items:baseline;
        gap:10px;
        margin:5px 0;
        font-size:13px;
        color:#2f3544;
      }
      .checkout-row:first-child{ margin-top:0; }
      .checkout-row:last-child{ margin-bottom:0; }
      .checkout-row.total strong{
        font-size:20px;
        color:var(--c3);
        font-family:'Playfair Display',serif;
        font-style:italic;
        font-weight:700;
      }
      .cart-hint{
        margin-top:10px;
        padding:10px 11px;
        border-radius:10px;
        font-size:11px;
        line-height:1.5;
        color:#3f4553;
        background:rgba(109,255,105,.12);
        border:none;
      }
      .cart-foot{
        padding:12px 18px 16px;
        border-top:none;
        flex-shrink:0;
        background:rgba(255,255,255,.64);
      }
      .checkout-actions{
        display:flex;
        justify-content:flex-end;
        flex-wrap:wrap;
        gap:8px;
      }
      .checkout-actions button{
        border:none;
        border-radius:10px;
        background:var(--c1);
        color:#ffffff;
        padding:9px 14px;
        font-size:11px;
        font-weight:700;
        letter-spacing:.04em;
        cursor:pointer;
        transition:transform .12s ease, background .15s ease;
      }
      .checkout-actions button:active{ transform:scale(.98); }
      .checkout-actions .go{
        background:linear-gradient(180deg, var(--c6), var(--c3));
        color:#ffffff;
        box-shadow:0 6px 18px rgba(255,70,34,.25);
      }
      .checkout-actions .go:hover{
      }
      .hint{
        position:absolute;
        left:50%;
        bottom:16px;
        transform: translateX(-50%);
        font-size:11px;
        letter-spacing:.14em;
        text-transform:uppercase;
        color:var(--c5);
        z-index:3;
      }
      @media (max-width: 700px){
        .wrap{ padding:12px 10px; }
        .stage{ min-height: 80vh; }
        .home-btn{
          top:16px;
          right:14px;
        }
        .viewer-shell{
          left:50%;
          top:50%;
          width:min(94vw, 520px);
          height:min(54vh, 460px);
          transform: translate(-50%, -50%) scale(0.94);
        }
        .viewer-shell.is-active{
          transform: translate(-50%, -50%) scale(1.0);
        }
        .viewer-shell.is-info-hover{
          transform: translate(-50%, -50%) scale(1.03);
        }
        .product-body{
          top:74%;
          width:min(94vw, 520px);
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="page-grid" id="page-grid" aria-hidden="true"></div>
      <section class="stage" aria-label="Product stage" id="product-stage">
        <div id="preview-photo-bg" aria-hidden="true"></div>
        <a class="home-btn" href="./index.html" data-soft-nav>Home</a>
        <div class="stage-head">
          <h1>Shop</h1>
          <p>Clean stage preview. Move cursor near model.</p>
        </div>
        <div class="viewer-shell" id="viewer-shell">
          <div id="box-viewer" class="viewer"></div>
        </div>
        <div class="product-body" id="product-info">
          <div class="product-top">
            <div class="product-left">
              <div>
                <h2 class="product-title">CCC</h2>
                <div class="edition-tag" id="edition-tag">LIMITED CARTRIDGE EDITION</div>
              </div>
            </div>
            <div class="product-price" id="product-price">NT$3600 <span class="currency-unit twd">TWD</span></div>
          </div>
          <div class="product-photo-stack" id="product-photo-stack" role="button" tabindex="0" aria-label="Preview photos">
            <img class="product-photo-card card-left" src="./shop-assets/card-1.png" alt="Preview card 1" />
            <img class="product-photo-card card-main" src="./shop-assets/card-2.png" alt="Preview card 2" />
            <img class="product-photo-card card-right" src="./shop-assets/card-3.png" alt="Preview card 3" />
          </div>
          <p class="product-meta" id="product-meta">3D-printed with a vintage GBA cartridge (1 of 25),<br>featuring a one-to-multi cable charm.</p>
          <div class="product-actions">
            <button id="add-cart-btn" type="button">Add Cart</button>
          </div>
        </div>
        <div class="hint">Hover near the model</div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
      (function(){
        const params = new URLSearchParams(window.location.search);
        const urlLang = params.get('lang');
        const lang = (urlLang === 'zh' || (!urlLang && localStorage.getItem('site_lang') === 'zh')) ? 'zh' : 'en';
        localStorage.setItem('site_lang', lang);
        const isZh = lang === 'zh';
        const t = (en, zh)=> isZh ? zh : en;
        const PRICE_TWD = 3600;
        const displayPrice = `NT$${PRICE_TWD} <span class="currency-unit twd">TWD</span>`;
        const PREVIEW_MODE = new URLSearchParams(window.location.search).has('preview');
        // If a custom static payment link is provided, use it.
        // Otherwise, fall back to the normal `onCheckout()` flow (create-order -> redirect).
        const ECPAY_PAYMENT_LINK = window.ECPAY_PAYMENT_LINK || 'https://p.ecpay.com.tw/D588FF7';
        const ECPAY_CREATE_ORDER_API = '/api/ecpay/create-order';
        function postToEcpay(action, fields){
          const form = document.createElement('form');
          form.method = 'POST';
          form.action = action;
          form.style.display = 'none';
          Object.keys(fields).forEach((key)=>{
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = String(fields[key] ?? '');
            form.appendChild(input);
          });
          document.body.appendChild(form);
          form.submit();
        }
        function openCartDrawer(titleText, priceText, onCheckout){
          const existing = document.getElementById('cart-sheet');
          if (existing) existing.remove();
          const sheet = document.createElement('div');
          sheet.className = 'cart-sheet';
          sheet.id = 'cart-sheet';
          sheet.innerHTML = `
            <div class="cart-panel" role="dialog" aria-modal="true" aria-label="${t('Cart','購物車')}">
              <div class="cart-head">
                <h3>${t('Cart','購物車')}</h3>
                <p>${t('Checkout is on the ECPay page.', '結帳流程將在綠界頁面完成。')}</p>
              </div>
              <div class="cart-body">
                <div class="cart-summary">
                  <div class="checkout-row"><span>${t('Item','商品')}</span><strong>${titleText}</strong></div>
                  <div class="checkout-row"><span>${t('Qty','數量')}</span><strong>1</strong></div>
                  <div class="checkout-row total"><span>${t('Total','總計')}</span><strong>${priceText}</strong></div>
                </div>
                <p class="cart-hint">${t(
                  'Shipping details can be filled on ECPay.',
                  '收件資訊可在綠界付款頁填寫。'
                )}</p>
              </div>
              <div class="cart-foot">
                <div class="checkout-actions">
                  <button type="button" class="stay">${t('Continue shopping','繼續逛逛')}</button>
                  <button type="button" class="go">${t('Checkout','前往結帳')}</button>
                </div>
              </div>
            </div>`;
          document.body.appendChild(sheet);
          requestAnimationFrame(()=>sheet.classList.add('is-open'));
          const close = ()=>{
            sheet.classList.remove('is-open');
            setTimeout(()=>sheet.remove(), 240);
          };
          sheet.addEventListener('click', (e)=>{ if (e.target === sheet) close(); });
          sheet.querySelector('.stay').addEventListener('click', close);
          sheet.querySelector('.go').addEventListener('click', async ()=>{
            if (ECPAY_PAYMENT_LINK){
              window.location.href = ECPAY_PAYMENT_LINK;
              return;
            }
            await onCheckout();
          });
        }
        function enableSoftNav(){
          document.body.classList.add('is-ready');
          document.querySelectorAll('a[data-soft-nav]').forEach((link)=>{
            link.addEventListener('click', (ev)=>{
              const href = link.getAttribute('href');
              const target = link.getAttribute('target');
              if (!href || href.startsWith('#') || target === '_blank') return;
              ev.preventDefault();
              document.body.classList.add('is-exiting');
              setTimeout(()=>{ window.location.href = href; }, 190);
            });
          });
        }
        enableSoftNav();
        const homeBtn = document.querySelector('.home-btn');
        const stageTitle = document.querySelector('.stage-head h1');
        const stageDesc = document.querySelector('.stage-head p');
        const hintEl = document.querySelector('.hint');
        const addCartBtnEl = document.getElementById('add-cart-btn');
        const editionTag = document.getElementById('edition-tag');
        const productMeta = document.getElementById('product-meta');
        const productPrice = document.getElementById('product-price');
        if (homeBtn) homeBtn.textContent = t('Home', '首頁');
        if (stageTitle) stageTitle.textContent = t('Shop', '商店');
        if (stageDesc) stageDesc.textContent = t('Clean stage preview. Move cursor near model.', '商品展示區。將游標移到模型附近可查看光效。');
        if (hintEl) hintEl.textContent = t('Hover near the model', '將游標移到模型附近');
        if (addCartBtnEl) addCartBtnEl.textContent = t('Add Cart', '加入購物車');
        if (productPrice) productPrice.innerHTML = displayPrice;
        if (editionTag) editionTag.textContent = t('LIMITED CARTRIDGE EDITION', '限量卡匣特別版');
        if (productMeta) productMeta.innerHTML = t(
          '3D-printed with a vintage GBA cartridge (1 of 25),<br>featuring a one-to-multi cable charm.',
          '3D 列印打造，搭配復古 GBA 卡匣（限量25 件），<br>和一對多連接線吊飾。'
        );
        if (homeBtn){

            const avg = (r + g + b) / 3;
            // Boost saturation/contrast so monogram stands out clearly.

        function ensureUvForMesh(mesh){
          if (!mesh || !mesh.geometry) return;
          const g = mesh.geometry;
          const p = g.attributes && g.attributes.position;
          if (!p || !p.count) return;
          const uv = g.attributes && g.attributes.uv;
          if (uv && uv.count === p.count) return;

          // Generate planar UVs from the two largest geometry axes.
          let minX=Infinity, minY=Infinity, minZ=Infinity;
          let maxX=-Infinity, maxY=-Infinity, maxZ=-Infinity;
          for (let i = 0; i < p.count; i++){
            const x = p.getX(i), y = p.getY(i), z = p.getZ(i);
            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;
            if (z < minZ) minZ = z; if (z > maxZ) maxZ = z;
          }
          const sx = Math.max(1e-6, maxX - minX);
          const sy = Math.max(1e-6, maxY - minY);
          const sz = Math.max(1e-6, maxZ - minZ);
          const axes = [
            { id:'x', size:sx, min:minX, max:maxX },
            { id:'y', size:sy, min:minY, max:maxY },
            { id:'z', size:sz, min:minZ, max:maxZ },
          ].sort((a,b)=>b.size - a.size);
          const uA = axes[0].id;
          const vA = axes[1].id;
          const getCoord = (i, a)=> a === 'x' ? p.getX(i) : (a === 'y' ? p.getY(i) : p.getZ(i));
          const getMin = (a)=> a === 'x' ? minX : (a === 'y' ? minY : minZ);
          const getSize = (a)=> a === 'x' ? sx : (a === 'y' ? sy : sz);
          const out = new Float32Array(p.count * 2);
          for (let i = 0; i < p.count; i++){
            out[i*2] = (getCoord(i, uA) - getMin(uA)) / getSize(uA);
            out[i*2 + 1] = (getCoord(i, vA) - getMin(vA)) / getSize(vA);
          }
          g.setAttribute('uv', new THREE.BufferAttribute(out, 2));
          g.attributes.uv.needsUpdate = true;
        }

          if (caseBtn){
            caseBtn.textContent = 'Case: ' + (modelState.caseVisible ? 'On' : 'Off');
            if (!parts['1'].length){
              caseBtn.disabled = true;
              caseBtn.style.opacity = '0.55';
            }
          }
          if (part3Btn){
            part3Btn.textContent = 'Part 3: ' + (modelState.showPart3 ? 'On' : 'Off');
            const hasPart3 = (parts['3'] && parts['3'].length) || !!modelState.part3Node;
            if (!hasPart3){
              part3Btn.disabled = true;
              part3Btn.style.opacity = '0.55';
            }
          }
        }
        if (caseBtn){
          caseBtn.addEventListener('click', ()=>{
            modelState.caseVisible = !modelState.caseVisible;
            applyShopParts();
          });
        }
        if (part3Btn){
          part3Btn.addEventListener('click', ()=>{
            modelState.showPart3 = !modelState.showPart3;
            applyShopParts();
          });
        }

        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
        loader.setDRACOLoader(dracoLoader);
        const loadGlb = (url)=>new Promise((resolve, reject)=>{
          loader.load(url, resolve, undefined, reject);
        });
        const meshListOf = (obj)=>{
          const arr = [];
          obj.traverse((o)=>{ if (o.isMesh) arr.push(o); });
          return arr;
        };
        let modelRoot = null;
        const motionState = {
          progress: 0,
          part3BaseX: 0,
          part3BaseZ: 0,
          part3SlideX: 0,
          part3SlideZ: 0,
          prevPart3SlideX: 0,
          prevPart3SlideZ: 0,
          cartridgeBaseX: 0,
          cartridgeBaseZ: 0,
          stickerBaseX: 0,
          stickerBaseZ: 0,
          caseBaseRotX: 0,
          caseBaseX: 0,
          caseBaseY: 0,
          caseBaseZ: 0,
          caseLiftY: 0,
          casePivotLocal: new THREE.Vector3(),
          initialized: false
        };
        const finalizeRoot = (root, parts)=>{
          modelState.parts = parts;
          applyShopParts();

          const box = new THREE.Box3().setFromObject(root);
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          root.scale.setScalar(0.92 / maxDim); // make model bigger
          root.updateWorldMatrix(true, true);
          const centered = new THREE.Box3().setFromObject(root);
          const center = centered.getCenter(new THREE.Vector3());
          root.position.sub(center);
          root.position.x += (window.innerWidth <= 700) ? 0.70 : 2.10;
          root.position.y += 0.0;
          stageGlow.position.x = root.position.x;
          stageGlow.position.z = root.position.z;
          hoverAreaWash.position.x = root.position.x;
          hoverAreaWash.position.z = root.position.z;
          const aim = new THREE.Vector3(root.position.x, root.position.y + 0.02, root.position.z);
          hoverTopLightL.target.position.copy(aim);
          hoverTopLightR.target.position.copy(aim);
          root.updateWorldMatrix(true, true);
          focusControlsOnMeshes(root, parts);

          // Cache model transform so we can shift+shrink on preview and restore later.
          modelBaseX = root.position.x;
          modelBaseY = root.position.y;
          modelBaseZ = root.position.z;
          modelBaseScale = root.scale.x || 1;
          cameraOffset = camera.position.clone().sub(controls.target.clone());

          modelRoot = root;
          scene.add(root);
          motionState.initialized = false;
          // Optional: 3D preview planes (disabled by default to keep DOM preview clean).
          if (USE_3D_PREVIEW){
            initPreviewPlanesIfNeeded();
          }
        };

        (async ()=>{
          try {
            // Primary: show all five models together.
            const [caseGltf, panelGltf, part3Gltf, bodyGltf, stickerGltf] = await Promise.all([
              loadGlb('./0318.glb'),
              loadGlb('./box_panel.glb'),
              loadGlb('./box_part3.glb'),
              loadGlb('./cartridge.glb'),
              loadGlb('./cartridge_sticker.glb'),
            ]);
            const root = new THREE.Group();
            root.add(caseGltf.scene);
            root.add(panelGltf.scene);
            root.add(part3Gltf.scene);
            root.add(bodyGltf.scene);
            root.add(stickerGltf.scene);
            modelState.caseNode = caseGltf.scene;
            modelState.part3Node = part3Gltf.scene;
            modelState.panelNode = panelGltf.scene;
            modelState.cartridgeNode = bodyGltf.scene;
            modelState.stickerNode = stickerGltf.scene;
            modelState.cartridgeMeshes = meshListOf(bodyGltf.scene);
            modelState.stickerMeshes = meshListOf(stickerGltf.scene);
            modelState.stickerMeshes.forEach(ensureUvForMesh);

            const p1 = meshListOf(caseGltf.scene).concat(meshListOf(bodyGltf.scene));
            const p2 = meshListOf(panelGltf.scene);
            const p3 = meshListOf(part3Gltf.scene);
            // Make sure case/panel meshes have UVs so the silver textures display nicely.
            p1.forEach(ensureUvForMesh);
            p2.forEach(ensureUvForMesh);
            const used = new Set([].concat(p1, p2, p3));
            const all = meshListOf(root);
            const parts = { '1':p1, '2':p2, '3':p3, other: all.filter((m)=>!used.has(m)) };
            finalizeRoot(root, parts);
          } catch (allErr){
            console.warn('five-model load failed, fallback to box.glb', allErr);
            modelState.caseNode = null;
            modelState.part3Node = null;
            modelState.panelNode = null;
            try {
              const gltf = await loadGlb('./box.glb');
              const root = gltf.scene;
              const parts = collectPartMeshes(root);
              finalizeRoot(root, parts);
            } catch (err){
              mount.innerHTML = '<div style="display:flex;height:100%;align-items:center;justify-content:center;color:#73738a;font-size:12px;">Unable to load all five models or fallback box model</div>';
            }
          }
        })();

        let active = false;
        function setActive(v){
          if (active === v) return;
          active = v;
          shell.classList.toggle('is-active', active);
          hoverTopLightL.intensity = active ? 3.4 : 0;
          hoverTopLightR.intensity = active ? 3.4 : 0;
          hoverAreaWash.material.opacity = 0.0;
          if (!active){
            autoOutLatch = false;
            // Cancel the background preview and restore model.
            bgPreviewEnabled = false;
            bgPreviewProgress = 0;
            if (stage){
              stage.classList.remove('is-bg-preview');
            }
            setPreviewBgIndex(1);
            if (modelRoot){
              modelRoot.position.set(modelBaseX, modelBaseY, modelBaseZ);
              modelRoot.scale.setScalar(modelBaseScale);
              stageGlow.position.x = modelBaseX;
              hoverAreaWash.position.x = modelBaseX;
            controls.target.copy(modelRoot.position);
            controls.update();
              modelRoot.updateWorldMatrix(true, true);
            }
          }
        }

        function checkProximity(clientX, clientY){
          // While dragging the preview background, don't cancel the hover/open state.
          if (bgPreviewEnabled && bgDragActive) return;
          const r = shell.getBoundingClientRect();
          const cx = r.left + r.width/2;
          const cy = r.top + r.height/2;
          const dx = clientX - cx;
          const dy = clientY - cy;
          const dist = Math.hypot(dx, dy);
          const ir = info.getBoundingClientRect();
          const inInfo = clientX >= ir.left && clientX <= ir.right && clientY >= ir.top && clientY <= ir.bottom;
          const sr = stage.getBoundingClientRect();
          const inTopDeadZone = clientY < (sr.top + 110);
          if (inTopDeadZone && !inInfo){
            setActive(false);
            return;
          }
          setActive(dist < 280 || inInfo);
        }

        info.classList.add('is-active');
        shell.addEventListener('pointermove', (e)=>checkProximity(e.clientX, e.clientY));
        stage.addEventListener('pointermove', (e)=>checkProximity(e.clientX, e.clientY));
        stage.addEventListener('pointerdown', (e)=>{
          if (!bgPreviewEnabled) return;
          const target = e && e.target;
          if (target && target.closest && (target.closest('#viewer-shell') || target.closest('#box-viewer'))) return;
          bgDragActive = true;
          bgDragStartX = e.clientX;
          bgDragStartIndex = bgIndex;
          try{ stage.setPointerCapture && stage.setPointerCapture(e.pointerId); } catch(err){}
        });
        stage.addEventListener('pointermove', (e)=>{
          if (!bgDragActive) return;
          const rect = stage.getBoundingClientRect();
          const deltaNorm = (e.clientX - bgDragStartX) / Math.max(1, rect.width / 2);
          const next = bgDragStartIndex + Math.round(deltaNorm);
          setPreviewBgIndex(next);
        });
        const endBgDrag = ()=>{
          bgDragActive = false;
          try{ stage.releasePointerCapture && stage.releasePointerCapture(); } catch(err){}
        };
        stage.addEventListener('pointerup', endBgDrag);
        stage.addEventListener('pointercancel', endBgDrag);
        shell.addEventListener('pointerleave', ()=>{
          setActive(false);
          shell.classList.remove('is-info-hover');
        });
        shell.addEventListener('pointerdown', ()=>setActive(true));
        info.addEventListener('pointerenter', ()=>{
          setActive(true);
          shell.classList.add('is-info-hover');
        });
        info.addEventListener('pointermove', ()=>{
          setActive(true);
          shell.classList.add('is-info-hover');
        });
        info.addEventListener('pointerleave', ()=>shell.classList.remove('is-info-hover'));

        let rafId = 0;
        function tick(){
          if (rotateResumeAt && performance.now() >= rotateResumeAt){
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.32;
            rotateResumeAt = 0;
          }
          if (modelRoot && !motionState.initialized){
            if (modelState.part3Node){
              motionState.part3BaseX = modelState.part3Node.position.x;
              motionState.part3BaseZ = modelState.part3Node.position.z;
            }
            if (modelState.cartridgeNode){
              motionState.cartridgeBaseX = modelState.cartridgeNode.position.x;
              motionState.cartridgeBaseZ = modelState.cartridgeNode.position.z;
            }
            if (modelState.stickerNode){
              motionState.stickerBaseX = modelState.stickerNode.position.x;
              motionState.stickerBaseZ = modelState.stickerNode.position.z;
            }
            if (modelState.caseNode){
              motionState.caseBaseRotX = modelState.caseNode.rotation.x;
              motionState.caseBaseX = modelState.caseNode.position.x;
              motionState.caseBaseY = modelState.caseNode.position.y;
              motionState.caseBaseZ = modelState.caseNode.position.z;
              const caseBox = new THREE.Box3().setFromObject(modelState.caseNode);
              const caseSizeWorld = caseBox.getSize(new THREE.Vector3());
              const rootScale = Math.max(0.0001, Math.abs(modelRoot.scale.x || 1));
              // Convert world size back to local-ish units so animation isn't tiny after scaling.
              const caseSize = caseSizeWorld.clone().divideScalar(rootScale);
              // Restore previous main axis style (X-led), but travel in the opposite way.
              motionState.part3SlideX = Math.max(10, Math.min(90, caseSize.x * 0.6));
              motionState.part3SlideZ = Math.max(1, Math.min(12, caseSize.z * 0.06));
              // Keep the earlier (previous) part3 profile for cartridge+sticker linkage.
              motionState.prevPart3SlideX = -Math.max(2, Math.min(14, caseSize.x * 0.08));
              motionState.prevPart3SlideZ = Math.max(14, Math.min(120, caseSize.x * 0.72));
              // Add a clear upward lift distance on case opening.
              motionState.caseLiftY = Math.max(2, Math.min(26, caseSize.y * 0.2));
              // Keep previous vertical level for the hinge compensation point.
              motionState.casePivotLocal.set(
                0,
                caseSize.y * 0.12,
                -caseSize.z * 0.36
              );
            }
            motionState.initialized = true;
          }
          const target = active ? 1 : 0;
          motionState.progress += (target - motionState.progress) * 0.08;
          // After the opening motion finishes, start the "background picture + shift+shrink model" preview.
          if (target === 1 && modelState.caseNode && motionState.progress >= 0.8){
            if (!autoOutLatch){
              bgPreviewEnabled = true;
              if (stage) stage.classList.add('is-bg-preview');
              setPreviewBgIndex(1);
              autoOutLatch = true;
            }
          }
          if (modelState.part3Node){
            // Step 1: X-led slide, reversed direction.
            modelState.part3Node.position.x = motionState.part3BaseX + (motionState.part3SlideX * motionState.progress);
            modelState.part3Node.position.z = motionState.part3BaseZ + (motionState.part3SlideZ * motionState.progress);
            // Use the previous part3 movement profile for cartridge + sticker.
            const prevDx = 0;
            const prevDz = motionState.prevPart3SlideZ * motionState.progress;
            if (modelState.cartridgeNode){
              modelState.cartridgeNode.position.x = motionState.cartridgeBaseX + prevDx;
              modelState.cartridgeNode.position.z = motionState.cartridgeBaseZ + prevDz;
            }
            if (modelState.stickerNode){
              modelState.stickerNode.position.x = motionState.stickerBaseX + prevDx;
              modelState.stickerNode.position.z = motionState.stickerBaseZ + prevDz;
            }
          }
          if (modelState.caseNode){
            // Step 2: rotate the case body.
            const delta = -0.68 * motionState.progress;
            modelState.caseNode.rotation.x = motionState.caseBaseRotX + delta;
            // Re-anchor pivot line away from center toward the requested side marker.
            const pivot = motionState.casePivotLocal;
            const rotatedPivot = pivot.clone().applyAxisAngle(new THREE.Vector3(1, 0, 0), delta);
            const offset = pivot.clone().sub(rotatedPivot);
            modelState.caseNode.position.x = motionState.caseBaseX + offset.x;
            modelState.caseNode.position.y = motionState.caseBaseY + offset.y + (motionState.caseLiftY * motionState.progress);
            modelState.caseNode.position.z = motionState.caseBaseZ + offset.z;
          }

          if (USE_3D_PREVIEW){
            // Slide the three preview planes in/out from the opened case.
            const planesTarget = (planesTargetOut && modelState && modelState.caseVisible) ? 1 : 0;
            previewProgress += (planesTarget - previewProgress) * 0.08;
            syncPreviewPlanesToProgress();
          }

          // Background-preview transform: shift right + shrink.
          const previewTarget = bgPreviewEnabled ? 1 : 0;
          bgPreviewProgress += (previewTarget - bgPreviewProgress) * 0.08;
          if (modelRoot){
            const indexOffset = bgIndex - 1; // -1 left / 0 center / +1 right
            const nextX = modelBaseX + bgPreviewProgress * (PREVIEW_SHIFT_X + indexOffset * PREVIEW_SHIFT_PER_INDEX);
            const nextY = modelBaseY + PREVIEW_SHIFT_Y * bgPreviewProgress;
            const nextScale = modelBaseScale * (1 - (1 - PREVIEW_SCALE) * bgPreviewProgress);
            modelRoot.position.set(nextX, nextY, modelBaseZ);
            modelRoot.scale.setScalar(nextScale);

            // Keep stage glow + hover wash aligned with the moving model.
            stageGlow.position.x = nextX;
            hoverAreaWash.position.x = nextX;

            hoverTopLightL.target.position.x = nextX;
            hoverTopLightR.target.position.x = nextX;

            // Keep orbit target on the moving model (doesn't lock camera position).
            controls.target.copy(modelRoot.position);
            modelRoot.updateWorldMatrix(true, true);
          }
          controls.update();
          renderer.render(scene, camera);
          rafId = requestAnimationFrame(tick);
        }
        tick();
        document.addEventListener('visibilitychange', ()=>{
          if (document.hidden){
            if (rafId){
              cancelAnimationFrame(rafId);
              rafId = 0;
            }
            return;
          }
          if (!rafId) tick();
        });

        window.addEventListener('resize', ()=>{
          buildPageGrid();
          const w = mount.clientWidth;
          const h = mount.clientHeight;
          renderer.setSize(w, h);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        });
      })();
    </script>
  </body>
</html>
